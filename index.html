function initGym() {
  if (!state.gym) {
    state.gym = {
      workouts: DEFAULT_WORKOUTS,
      sessions: [] // { date, workoutId, exercises: { exId: [{weight, reps}] } }
    };
  }
}

function getLastSession(workoutId) {
  return [...(state.gym.sessions||[])].reverse().find(s => s.workoutId === workoutId);
}

function getProgressionSuggestion(ex, lastSession) {
  if (!lastSession) return null;
  const sets = lastSession.exercises[ex.id] || [];
  if (sets.length === 0) return null;
  const allHitMax = sets.every(s => s.reps >= ex.maxReps);
  const anyBelowMin = sets.some(s => s.reps < ex.minReps);
  if (allHitMax) return { type: 'progress', text: `↑ Add ${ex.incr}lbs` };
  if (anyBelowMin) return { type: 'deload', text: `↓ Deload` };
  return { type: 'hold', text: `→ Hold weight` };
}

function renderGymCard() {
  initGym();
  const el = document.getElementById('gym-card-body');
  if (!el) return;
  const sessions = state.gym.sessions || [];
  const recent = sessions.slice(-6).reverse();

  if (recent.length === 0) {
    el.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:4px 0">No sessions logged yet. Tap + to start.</div>`;
    return;
  }

  el.innerHTML = recent.map(s => {
    const w = state.gym.workouts.find(w => w.id === s.workoutId);
    if (!w) return '';
    const exCount = Object.keys(s.exercises||{}).length;
    const totalSets = Object.values(s.exercises||{}).reduce((sum,sets)=>sum+sets.length,0);
    return `<div class="gym-day-row" onclick="openGymSession('${s.workoutId}','${s.date}')">
      <div class="gym-day-dot ${w.color}"></div>
      <div>
        <div class="gym-day-name">${w.name} Day</div>
        <div class="gym-day-meta">${s.date} · ${exCount} exercises · ${totalSets} sets</div>
      </div>
    </div>`;
  }).join('');
}

let gymCtx = { workoutId: null, date: null };

function openGymPopup() {
  initGym();
  // show workout selector
  document.getElementById('gym-popup-title').textContent = 'Start Workout';
  document.getElementById('gym-popup-date').textContent = dateStr(state.today);
  document.getElementById('gym-popup-body').innerHTML = `
    <div style="padding:16px 0 8px;font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em">Select workout</div>
    ${state.gym.workouts.map(w => {
      const last = getLastSession(w.id);
      const lastDate = last ? last.date : 'Never';
      return `<div class="gym-day-row" style="border-radius:8px;border:1px solid var(--border);margin-bottom:8px;padding:12px 14px" onclick="openGymLogger('${w.id}')">
        <div class="gym-day-dot ${w.color}"></div>
        <div>
          <div class="gym-day-name">${w.name} Day</div>
          <div class="gym-day-meta">Last: ${lastDate}</div>
        </div>
        <span style="font-size:18px;color:var(--muted)">›</span>
      </div>`;
    }).join('')}
  `;
  document.getElementById('gym-overlay').classList.add('open');
}

function openGymLogger(workoutId, existingDate) {
  initGym();
  const w = state.gym.workouts.find(w => w.id === workoutId);
  if (!w) return;
  const sessionDate = existingDate || dateStr(state.today);
  gymCtx = { workoutId, date: sessionDate };
  const lastSession = getLastSession(workoutId);

  // find existing session for this date if editing
  const existing = (state.gym.sessions||[]).find(s => s.workoutId === workoutId && s.date === sessionDate);

  document.getElementById('gym-popup-title').textContent = `${w.name} Day`;
  document.getElementById('gym-popup-date').textContent = sessionDate;

  document.getElementById('gym-popup-body').innerHTML = w.exercises.map(ex => {
    const suggestion = getProgressionSuggestion(ex, lastSession);
    const lastSets = lastSession?.exercises[ex.id] || [];
    const existingSets = existing?.exercises[ex.id] || [];
    // suggested weight = last weight + increment if progressing, else last weight
    const suggestedWeight = lastSets.length > 0
      ? (suggestion?.type === 'progress' ? lastSets[0].weight + ex.incr : lastSets[0].weight)
      : '';

    const setInputs = Array.from({length: ex.sets}, (_, i) => {
      const prev = lastSets[i];
      const curr = existingSets[i];
      return `<div class="gym-set-col">
        <div class="gym-set-label">Set ${i+1}</div>
        <input class="gym-set-input" id="ex-${ex.id}-w-${i}" type="number" min="0" step="2.5"
          placeholder="lbs" value="${curr?.weight ?? suggestedWeight}" style="margin-bottom:3px">
        <input class="gym-set-input" id="ex-${ex.id}-r-${i}" type="number" min="0"
          placeholder="reps" value="${curr?.reps ?? ''}">
        ${prev ? `<div class="gym-prev">${prev.weight}×${prev.reps}</div>` : '<div class="gym-prev">—</div>'}
      </div>`;
    }).join('');

    const sugTag = suggestion
      ? `<span class="gym-suggest ${suggestion.type}">${suggestion.text}</span>` : '';

    return `<div class="gym-exercise-block">
      <div class="gym-ex-header">
        <span class="gym-ex-name">${ex.name}</span>
        <span class="gym-ex-target">${ex.sets}×${ex.minReps}–${ex.maxReps}</span>
      </div>
      ${sugTag}
      <div class="gym-sets-grid">${setInputs}</div>
    </div>`;
  }).join('');
}

function openGymSession(workoutId, date) {
  openGymLogger(workoutId, date);
}

function saveGymSession() {
  initGym();
  const { workoutId, date } = gymCtx;
  if (!workoutId) return;
  const w = state.gym.workouts.find(w => w.id === workoutId);
  if (!w) return;

  const exercises = {};
  w.exercises.forEach(ex => {
    const sets = [];
    for (let i = 0; i < ex.sets; i++) {
      const wEl = document.getElementById(`ex-${ex.id}-w-${i}`);
      const rEl = document.getElementById(`ex-${ex.id}-r-${i}`);
      if (wEl && rEl && wEl.value && rEl.value) {
        sets.push({ weight: parseFloat(wEl.value), reps: parseInt(rEl.value) });
      }
    }
    if (sets.length > 0) exercises[ex.id] = sets;
  });

  // remove existing session for same date+workout if editing
  state.gym.sessions = (state.gym.sessions||[]).filter(s => !(s.workoutId === workoutId && s.date === date));
  state.gym.sessions.push({ date, workoutId, exercises });
  // sort by date
  state.gym.sessions.sort((a,b) => a.date.localeCompare(b.date));

  renderGymCard();
  saveData();
  document.getElementById('gym-overlay').classList.remove('open');
}

function closeGymPopup(e) {
  if (e && e.target !== document.getElementById('gym-overlay')) return;
  document.getElementById('gym-overlay').classList.remove('open');
}


const CARD_DEFS = [
  { id: 'habits',  label: 'Habits' },
  { id: 'goals',   label: 'Goals & Milestones' },
  { id: 'gym',     label: 'Gym' },
  { id: 'finance', label: 'Spending Tracker' },
  { id: 'lists',   label: 'Lists' },
];

function getCardState() {
  if (!state.cardLayout) {
    state.cardLayout = CARD_DEFS.map(c => ({ id: c.id, hidden: false }));
  }
  return state.cardLayout;
}

function applyCardLayout() {
  const layout = getCardState();
  const content = document.querySelector('.content');
  const cal = document.querySelector('.week-cal');

  // collect card elements
  const cardEls = {};
  document.querySelectorAll('[data-card-id]').forEach(el => {
    cardEls[el.dataset.cardId] = el;
  });
  const habitsGrid = cardEls['habits']?.closest('.grid-2');

  layout.forEach(({ id, hidden }) => {
    const el = cardEls[id];
    if (!el) return;
    if (hidden) {
      el.classList.add('card-hidden');
    } else {
      el.classList.remove('card-hidden');
    }
  });

  // reorder visible cards in the DOM
  const calSection = document.querySelector('.week-cal');
  let insertAfter = calSection;
  layout.forEach(({ id, hidden }) => {
    if (hidden) return;
    const el = cardEls[id];
    if (!el) return;
    const node = (id === 'habits' || id === 'goals') ? habitsGrid : el;
    if (node && node !== insertAfter) {
      insertAfter.after(node);
    }
    insertAfter = node || insertAfter;
  });
}

function openArrangeCards(e) {
  if (e) e.preventDefault();
  const layout = getCardState();
  const listEl = document.getElementById('arrange-list');
  listEl.innerHTML = layout.map(c => {
    const def = CARD_DEFS.find(d=>d.id===c.id);
    return `<div class="arrange-row" data-arrange-id="${c.id}">
      <span class="arrange-handle">⠿</span>
      <span class="arrange-name${c.hidden?' hidden-card':''}">${def?.label||c.id}</span>
      <div class="arrange-eye ${c.hidden?'hidden':'visible'}" onclick="toggleCardVisibility('${c.id}')">${c.hidden?'○':'●'}</div>
    </div>`;
  }).join('');
  setupArrangeDrag(listEl);
  document.getElementById('arrange-overlay').classList.add('open');
}

function toggleCardVisibility(cardId) {
  const layout = getCardState();
  const item = layout.find(c=>c.id===cardId);
  if (item) item.hidden = !item.hidden;
  applyCardLayout();
  saveData();
  openArrangeCards();
}

function closeArrangeCards(e) {
  if (e && e.target !== document.getElementById('arrange-overlay')) return;
  document.getElementById('arrange-overlay').classList.remove('open');
}

function setupArrangeDrag(list) {
  let srcIdx = null;
  list.querySelectorAll('.arrange-handle').forEach(handle => {
    let lp = null;
    const rows = () => [...list.querySelectorAll('.arrange-row')];
    const start = (e) => {
      if (e.preventDefault) e.preventDefault();
      const row = handle.closest('.arrange-row');
      srcIdx = rows().indexOf(row);
      row.style.opacity = '0.4';
      row.style.background = 'var(--accent-light)';
      rows().forEach((r, i) => {
        if (i === srcIdx) return;
        r.addEventListener('click', onDrop);
        r.addEventListener('touchend', onDrop);
      });
    };
    const onDrop = function() {
      const destIdx = rows().indexOf(this);
      if (srcIdx === null || destIdx === srcIdx) return cleanup();
      const layout = getCardState();
      const [moved] = layout.splice(srcIdx, 1);
      layout.splice(destIdx, 0, moved);
      applyCardLayout();
      saveData();
      cleanup();
      openArrangeCards();
    };
    const cleanup = () => {
      srcIdx = null;
      rows().forEach(r => {
        r.style.opacity = ''; r.style.background = '';
        r.removeEventListener('click', onDrop);
        r.removeEventListener('touchend', onDrop);
      });
    };
    handle.addEventListener('touchstart', () => { lp = setTimeout(() => start({}), 400); }, { passive: true });
    handle.addEventListener('touchend', () => clearTimeout(lp));
    handle.addEventListener('touchmove', () => clearTimeout(lp), { passive: true });
    handle.addEventListener('mousedown', start);
  });
}

function setupCardLongPress() {
  document.querySelectorAll('[data-card-id] .card-head').forEach(head => {
    let lp = null;
    head.addEventListener('touchstart', () => { lp = setTimeout(() => openArrangeCards(), 700); }, { passive: true });
    head.addEventListener('touchend', () => clearTimeout(lp));
    head.addEventListener('touchmove', () => clearTimeout(lp), { passive: true });
  });
}

async function loadWeather() {
  if (!navigator.geolocation) {
    document.getElementById('w-desc').textContent = 'Location unavailable';
    return;
  }
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    try {
      // reverse geocode for city name
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const geoData = await geoRes.json();
      const city = geoData.address.city || geoData.address.town || geoData.address.village || geoData.address.county || '';
      document.getElementById('w-location').textContent = city;

      // weather from Open-Meteo (free, no key)
      const wx = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&windspeed_unit=mph&forecast_days=1&timezone=auto`);
      const data = await wx.json();
      const cur = data.current;
      const daily = data.daily;
      const code = cur.weathercode;

      document.getElementById('w-icon').textContent = WMO_ICON[code] || '🌡';
      document.getElementById('w-temp').textContent = Math.round(cur.temperature_2m) + '°';
      document.getElementById('w-desc').textContent = WMO[code] || '';
      document.getElementById('w-hilo').textContent = `${Math.round(daily.temperature_2m_max[0])}° / ${Math.round(daily.temperature_2m_min[0])}°`;
    } catch {
      document.getElementById('w-desc').textContent = 'Weather unavailable';
    }
  }, () => {
    document.getElementById('w-desc').textContent = 'Location denied';
  });
}

function toggleDarkMode() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('planner_dark', isDark ? '1' : '0');
  document.getElementById('dark-toggle').textContent = isDark ? '○' : '◑';
}

function loadDarkMode() {
  const saved = localStorage.getItem('planner_dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === '1' || (saved === null && prefersDark)) {
    document.body.classList.add('dark');
    document.getElementById('dark-toggle').textContent = '○';
  }
}

// ──────────────────────────────────────────────
// PERSISTENCE
// ──────────────────────────────────────────────
const STORAGE_KEY = 'lifeplanner_v1';

function saveData() {
  try {
    const data = {
      events: state.events,
      habits: state.habits,
      goals: state.goals,
      budget: state.budget,
      health: state.health,
      lists: state.lists,
      gym: state.gym,
      cardLayout: state.cardLayout,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Save failed', e); }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.events) state.events = data.events.map(e => {
      if (!e.endDate) e.endDate = e.date;
      return e;
    });
    if (data.habits) {
      state.habits = data.habits.map(h => {
        if (!h.completions) h.completions = {};
        if (!h.type) h.type = 'check'; // migrate old habits
        return h;
      });
    }
    if (data.goals)   state.goals   = data.goals;
    if (data.budget) {
      state.budget = data.budget;
      // migrate old format (spent/budget fields) to new charge-based model
      state.budget.categories = (state.budget.categories||[]).map((c,i) => {
        if (!c.charges) c.charges = [];
        if (!c.id) c.id = i + 1;
        if (c.budget && !c.limit) c.limit = c.budget;
        return c;
      });
    }
    if (data.health)  state.health  = data.health;
    if (data.gym) state.gym = data.gym;
    if (data.cardLayout) state.cardLayout = data.cardLayout;
  } catch(e) { console.warn('Load failed', e); }
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
function init() {
  loadDarkMode();
  loadData();
  const d = state.today;
  document.getElementById('today-label').textContent =
    `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  renderCal();
  renderHabits();
  renderGoals();
  renderFinance();
  initGym();
  renderGymCard();
  renderList('recipes');
  renderList('shows');
  renderList('books');
  renderList('places');
  renderList('notes');
  applyCardLayout();
  setupCardLongPress();
  loadWeather();
}
init();
