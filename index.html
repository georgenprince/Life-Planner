<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2dd;
    --text: #1a1917;
    --muted: #8a8782;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent2: #c4622d;
    --accent2-light: #faeee7;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body.dark {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a32;
    --text: #e8e6e1;
    --muted: #5a5870;
    --accent: #4ade80;
    --accent-light: #0f2a1a;
    --accent2: #f97316;
    --accent2-light: #2a1500;
  }

  body, body * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease; }
  input, textarea, select { transition: none !important; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    -webkit-user-select: none;
    user-select: none;
  }

  input, textarea {
    -webkit-user-select: text;
    user-select: text;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; }

  /* TOP BAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .page-title { font-size: 13px; font-weight: 600; font-family: var(--mono); }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .btn-sm {
    height: 28px; padding: 0 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-sm:hover { background: var(--bg); }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm.primary:hover { opacity: 0.9; }

  /* CONTENT */
  .content { padding: 14px 12px; display: flex; flex-direction: column; gap: 14px; }

  /* WEEK CALENDAR */
  .week-cal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .cal-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 6px;
  }
  .cal-header h2 { font-size: 16px; font-weight: 600; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-nav button {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 14px; color: var(--text);
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .cal-nav button:hover { background: var(--bg); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    height: 28px; padding: 0 10px;
    border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface); font-family: var(--sans);
    font-size: 11px; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .view-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* WEEK VIEW */
  /* header row */
  .wv-header-row {
    display: flex;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 15;
  }
  .wv-time-gutter {
    width: 44px; flex-shrink: 0;
  }
  .wv-day-header {
    flex: 1; text-align: center;
    padding: 8px 2px 6px;
    border-right: 1px solid var(--border);
  }
  .wv-day-header:last-child { border-right: none; }
  .wdh-name { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-family: var(--mono); }
  .wdh-date {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 3px auto 0;
    font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .wdh-date:hover { background: var(--bg); }
  .wdh-date.today { background: var(--accent); color: #fff; }
  .wv-day-header.pto { background: var(--pto-bg, #f3e8ff); }
  body.dark .wv-day-header.pto { background: rgba(147,51,234,0.18); }

  /* all-day strip */
  .wv-allday-row {
    display: flex;
    border-bottom: 2px solid var(--border);
    min-height: 28px;
    align-items: stretch;
    position: relative;
    z-index: 8;
  }
  .wv-allday-grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(7, 1fr);
    position: relative;
    min-height: 28px;
  }
  .wv-allday-col {
    border-right: 1px solid var(--border);
    padding: 2px;
    cursor: pointer;
    min-height: 28px;
    position: relative;
    z-index: 1;
  }
  .wv-allday-col:last-child { border-right: none; }
  .wv-allday-col.pto { background: var(--pto-bg, #f3e8ff); }
  body.dark .wv-allday-col.pto { background: rgba(147,51,234,0.12); }
  /* multi-day spanning bars in all-day strip */
  .wv-allday-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 5;
    padding: 2px 0;
  }
  .wv-allday-overlay .month-bar-row { pointer-events: none; }
  .wv-allday-overlay .month-bar:not(.empty) { pointer-events: all; }

  /* time grid scroll container */
  .wv-scroll {
    position: relative;
    overflow: visible;
  }
  .wv-time-body {
    display: flex;
    position: relative;
  }
  /* time labels column */
  .wv-time-col {
    width: 44px; flex-shrink: 0;
    border-right: 1px solid var(--border);
  }
  .wv-time-label {
    height: 32px;
    display: flex; align-items: flex-start; justify-content: flex-end;
    padding: 2px 6px 0 0;
    font-size: 9px; color: var(--muted); font-family: var(--mono);
    box-sizing: border-box;
  }
  /* day columns in time grid */
  .wv-days-grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(7, 1fr);
    position: relative;
  }
  .wv-day-col {
    border-right: 1px solid var(--border);
    position: relative;
  }
  .wv-day-col:last-child { border-right: none; }
  .wv-day-col.pto { background: rgba(147,51,234,0.05); }
  .wv-hour-cell {
    height: 32px;
    border-bottom: 1px solid var(--border);
    box-sizing: border-box;
    cursor: pointer;
  }
  .wv-hour-cell:last-child { border-bottom: none; }
  .wv-hour-cell:hover { background: var(--accent-light); }
  /* timed event block */
  .wv-event-block {
    position: absolute; left: 1px; right: 1px;
    border-radius: 4px; padding: 2px 4px 2px 7px;
    font-size: 10px; font-weight: 500; overflow: hidden;
    cursor: pointer; z-index: 3; box-sizing: border-box;
  }
  .wv-event-block .ev-title { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wv-dur-bar {
    position: absolute; left: 0; top: 0; width: 3px;
    border-radius: 4px 0 0 4px;
  }
  .wv-event-block.green { background: var(--accent-light); color: var(--accent); }
  .wv-event-block.green .wv-dur-bar { background: var(--accent); }
  .wv-event-block.orange { background: var(--accent2-light); color: var(--accent2); }
  .wv-event-block.orange .wv-dur-bar { background: var(--accent2); }
  .wv-event-block.red { background: #fdecea; color: #c0392b; }
  .wv-event-block.red .wv-dur-bar { background: #c0392b; }
  .wv-event-block.yellow { background: #fef9e7; color: #b7950b; }
  .wv-event-block.yellow .wv-dur-bar { background: #f1c40f; }
  .wv-event-block.blue { background: #eaf4fb; color: #1a5276; }
  .wv-event-block.blue .wv-dur-bar { background: #2e86c1; }
  .wv-event-block.magenta { background: #fdf2f8; color: #76448a; }
  .wv-event-block.magenta .wv-dur-bar { background: #a93226; }
  .wv-event-block.purple { background: #f3e8ff; color: #6b21a8; }
  .wv-event-block.purple .wv-dur-bar { background: #9333ea; }
  .wv-event-block.gray { background: #f0eeea; color: #555; }
  .wv-event-block.gray .wv-dur-bar { background: #bbb; }
  body.dark .wv-event-block.green { background: var(--accent-light); color: var(--accent); }
  body.dark .wv-event-block.orange { background: var(--accent2-light); color: var(--accent2); }
  body.dark .wv-event-block.red { background: rgba(192,57,43,0.25); color: #e74c3c; }
  body.dark .wv-event-block.yellow { background: rgba(241,196,15,0.15); color: #f1c40f; }
  body.dark .wv-event-block.blue { background: rgba(46,134,193,0.25); color: #5dade2; }
  body.dark .wv-event-block.magenta { background: rgba(169,50,38,0.25); color: #e91e8c; }
  body.dark .wv-event-block.purple { background: rgba(147,51,234,0.25); color: #c084fc; }
  body.dark .wv-event-block.gray { background: rgba(255,255,255,0.08); color: #aaa; }
  /* all-day bullet (for single-day untimed events in allday strip) */
  .wv-allday-bullet {
    display: flex; align-items: center; gap: 3px;
    padding: 1px 2px; margin-bottom: 2px; cursor: pointer;
    border-radius: 3px;
  }
  .wv-allday-bullet:hover { background: var(--bg); }
  .wv-allday-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .wv-allday-text { font-size: 9px; line-height: 1.3; color: var(--text); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

  /* SPANNING EVENT BARS */
  .event-bar-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 1px 2px;
  }
  .event-bar {
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 9px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 1px 1px;
    cursor: pointer;
  }
  .event-bar.green { background: var(--accent-light); color: var(--accent); border-left: 2px solid var(--accent); }
  .event-bar.orange { background: var(--accent2-light); color: var(--accent2); border-left: 2px solid var(--accent2); }
  .event-bar.red { background: #fdecea; color: #c0392b; border-left: 2px solid #c0392b; }
  .event-bar.yellow { background: #fef9e7; color: #b7950b; border-left: 2px solid #f1c40f; }
  .event-bar.blue { background: #eaf4fb; color: #1a5276; border-left: 2px solid #2e86c1; }
  .event-bar.magenta { background: #fdf2f8; color: #76448a; border-left: 2px solid #a93226; }
  .event-bar.purple { background: #f3e8ff; color: #6b21a8; border-left: 2px solid #9333ea; }
  .event-bar.gray { background: #f0eeea; color: #555; border-left: 2px solid #bbb; }
  .event-bar.empty { background: transparent; border: none; pointer-events: none; }
  body.dark .event-bar.green { background: var(--accent-light); color: var(--accent); }
  body.dark .event-bar.orange { background: var(--accent2-light); color: var(--accent2); }
  body.dark .event-bar.red { background: rgba(192,57,43,0.2); color: #e74c3c; }
  body.dark .event-bar.yellow { background: rgba(241,196,15,0.15); color: #f1c40f; }
  body.dark .event-bar.blue { background: rgba(46,134,193,0.2); color: #5dade2; }
  body.dark .event-bar.magenta { background: rgba(169,50,38,0.2); color: #e91e8c; }
  body.dark .event-bar.purple { background: rgba(147,51,234,0.2); color: #c084fc; }
  body.dark .event-bar.gray { background: rgba(255,255,255,0.06); color: #aaa; }
  .month-grid { display: none; }
  .month-grid.visible { display: block; }
  .week-grid.hidden { display: none; }
  .month-inner {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    width: 100%;
  }
  .month-dow {
    padding: 6px 4px;
    text-align: center;
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    box-sizing: border-box;
  }
  .month-dow:last-child { border-right: none; }
  .month-cell {
    height: 72px; padding: 4px 3px 3px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    overflow: hidden;
    box-sizing: border-box;
    position: relative;
  }
  .month-cell:nth-child(7n) { border-right: none; }
  .month-cell:hover { background: var(--bg); }
  .month-cell.other-month .mday { color: #ccc; }
  .month-cell.today .mday {
    background: var(--accent); color: #fff;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .mday { font-size: 11px; font-weight: 500; margin-bottom: 2px; }

  /* MONTH WEEK ROWS */
  .month-week-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    position: relative;
  }
  .month-event-layer {
    position: absolute;
    top: 26px;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0;
  }
  .month-bar-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    pointer-events: all;
    height: 14px;
  }
  .month-bar {
    height: 13px;
    font-size: 8px; font-weight: 500;
    padding: 1px 4px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    cursor: pointer; border-radius: 0;
  }
  .month-bar.start { border-radius: 3px 0 0 3px; }
  .month-bar.solo { border-radius: 3px; }
  .month-bar.end { border-radius: 0 3px 3px 0; }
  .month-bar.empty { background: transparent !important; pointer-events: none; }
  .month-bar.green { background: var(--accent-light); color: var(--accent); }
  .month-bar.orange { background: var(--accent2-light); color: var(--accent2); }
  .month-bar.red { background: #fdecea; color: #c0392b; }
  .month-bar.yellow { background: #fef9e7; color: #b7950b; }
  .month-bar.blue { background: #eaf4fb; color: #1a5276; }
  .month-bar.magenta { background: #fdf2f8; color: #76448a; }
  .month-bar.purple { background: #f3e8ff; color: #6b21a8; }
  .month-bar.gray { background: #f0eeea; color: #555; }
  body.dark .month-bar.green { background: var(--accent-light); color: var(--accent); }
  body.dark .month-bar.orange { background: var(--accent2-light); color: var(--accent2); }
  body.dark .month-bar.red { background: rgba(192,57,43,0.2); color: #e74c3c; }
  body.dark .month-bar.yellow { background: rgba(241,196,15,0.15); color: #f1c40f; }
  body.dark .month-bar.blue { background: rgba(46,134,193,0.2); color: #5dade2; }
  body.dark .month-bar.magenta { background: rgba(169,50,38,0.2); color: #e91e8c; }
  body.dark .month-bar.purple { background: rgba(147,51,234,0.2); color: #c084fc; }
  body.dark .month-bar.gray { background: rgba(255,255,255,0.06); color: #aaa; }
  .m-event {
    font-size: 8px; padding: 1px 3px; border-radius: 2px;
    margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    display: block; min-height: 12px;
  }
  .m-event.green { background: var(--accent-light); color: var(--accent); }
  .m-event.orange { background: var(--accent2-light); color: var(--accent2); }
  .m-event.gray { background: #f0eeea; color: #555; }
  /* multi-day continuation cells — flush left/right edges */
  .month-cell:not(:nth-child(7n+1)) .m-event.multi-cont {
    border-radius: 0; margin-left: -1px; padding-left: 2px;
  }
  .month-cell:nth-child(7n) .m-event.multi-cont,
  .month-cell:nth-child(7n) .m-event.multi-start {
    border-radius: 0; margin-right: -1px;
  }
  .cal-event.green { background: var(--accent-light); color: var(--accent); border-left: 2px solid var(--accent); }
  .cal-event.orange { background: var(--accent2-light); color: var(--accent2); border-left: 2px solid var(--accent2); }
  .cal-event.gray { background: #f0eeea; color: #555; border-left: 2px solid #bbb; }
  .cal-event.red { background: #fdecea; color: #c0392b; border-left: 2px solid #c0392b; }
  .cal-event.yellow { background: #fef9e7; color: #b7950b; border-left: 2px solid #f1c40f; }
  .cal-event.blue { background: #eaf4fb; color: #1a5276; border-left: 2px solid #2e86c1; }
  .cal-event.magenta { background: #fdf2f8; color: #76448a; border-left: 2px solid #a93226; }
  .cal-event.purple { background: #f3e8ff; color: #6b21a8; border-left: 2px solid #9333ea; }
  .day-bullet-dot.purple { background: #9333ea; }
  .m-event.purple { background: #f3e8ff; color: #6b21a8; }
  .month-cell.pto { background: #f3e8ff; }
  .month-cell.pto:hover { background: #ead5ff; }
  .day-bullet-dot.yellow { background: #f1c40f; }
  .day-bullet-dot.blue { background: #2e86c1; }
  .day-bullet-dot.magenta { background: #8e44ad; }
  .m-event.red { background: #fdecea; color: #c0392b; }
  .m-event.yellow { background: #fef9e7; color: #b7950b; }
  .m-event.blue { background: #eaf4fb; color: #1a5276; }
  .m-event.magenta { background: #fdf2f8; color: #76448a; }

  /* GRID SECTIONS */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 14px; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-head {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head h3 { font-size: 13px; font-weight: 600; }
  .card-head .add-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: all 0.15s;
  }
  .card-head .add-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .card-head .head-btns { display: flex; align-items: center; gap: 6px; }
  .card-head .edit-btn {
    height: 22px; padding: 0 8px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 10px; font-family: var(--mono);
    color: var(--muted); transition: all 0.15s;
  }
  .card-head .edit-btn:hover { background: var(--bg); color: var(--text); }
  .card-head .edit-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* DRAG REORDER */
  .drag-handle {
    cursor: grab; color: var(--muted); font-size: 14px;
    padding: 0; flex-shrink: 0; user-select: none;
    opacity: 0; width: 0; overflow: hidden; transition: opacity 0.15s, width 0.15s;
  }
  .edit-mode .drag-handle { opacity: 1; width: 18px; padding: 0 4px; }
  .drag-handle:active { cursor: grabbing; }
  .delete-btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid #e0b0b0; background: #fff5f5;
    color: #c44; font-size: 12px; line-height: 1;
    cursor: pointer; flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .edit-mode .delete-btn { display: flex; }
  .delete-btn:hover { background: #c44; color: #fff; border-color: #c44; }
  .dragging { opacity: 0.4; }
  .drag-over { border-top: 2px solid var(--accent) !important; }
  .card-body { padding: 12px 14px; }

  /* HABITS */
  .habit-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .habit-row:last-child { border-bottom: none; }
  .habit-row.duration-row { flex-wrap: wrap; }

    border: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;

  .todo-check.done { background: var(--accent); border-color: var(--accent); color: #fff; }

  .todo-title { font-size: 13px; line-height: 1.4; }
  .todo-title.done { text-decoration: line-through; color: var(--muted); }

  .menu-item {
    display: flex; align-items: center; justify-content: space-between;

  .arrange-handle { font-size: 16px; color: var(--muted); cursor: grab; flex-shrink: 0; }
  .arrange-name { flex: 1; font-size: 13px; font-weight: 500; }
  .arrange-name.hidden-card { color: var(--muted); text-decoration: line-through; }
  .arrange-eye {

    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;

  .arrange-eye.visible { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .card.card-hidden { display: none; }
</style>
</head>

<script type="module">
// ──────────────────────────────────────────────
// HELPERS (must be defined before state)
// ──────────────────────────────────────────────
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function offsetDay(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate()-x.getDay()); return x; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
const state = {
  today: new Date(),
  calView: 'week',
  weekOffset: 0,
  monthOffset: 0,
  events: [],
  habits: [],
  budget: { categories: [] },
  todos: [],
  modalType: null,
};

// ──────────────────────────────────────────────
// CALENDAR
// ──────────────────────────────────────────────
function eventSpansDate(e, d) {
  const ds = dateStr(d);
  const end = e.endDate || e.date;
  return ds >= e.date && ds <= end;
}

function getWeekDays() {
  const base = startOfWeek(state.today);
  const shifted = new Date(base.getTime() + state.weekOffset * 7 * 24 * 60 * 60 * 1000);
  return Array.from({length:7}, (_,i) => new Date(shifted.getTime() + i * 24 * 60 * 60 * 1000));
}
function getMonthBase() {
  const d = new Date(state.today.getFullYear(), state.today.getMonth() + state.monthOffset, 1);
  return d;
}

// ──────────────────────────────────────────────
// WEEK VIEW CONSTANTS
// ──────────────────────────────────────────────
const HOUR_HEIGHT = 32; // px per hour
const DEFAULT_DAY_START = 6;  // 6am
const DEFAULT_DAY_END = 22;   // 10pm

function getVisibleHourRange(days) {
  let start = DEFAULT_DAY_START;
  let end = DEFAULT_DAY_END;
  const weekDates = new Set(days.map(d => dateStr(d)));
  state.events.forEach(e => {
    if (!e.startTime) return;
    if (!weekDates.has(e.date)) return;
    const startH = parseInt(e.startTime.split(':')[0]);
    const endH = e.endTime ? Math.ceil(parseInt(e.endTime.split(':')[0]) + parseInt(e.endTime.split(':')[1])/60) : startH + 1;
    if (startH < start) start = Math.max(0, startH);
    if (endH > end) end = Math.min(24, endH);
  });
  return { dayStart: start, dayEnd: end };
}

function fmtTime(h, m) {
  const ampm = h >= 12 ? 'pm' : 'am';
  const hr = h % 12 || 12;
  return m ? `${hr}:${String(m).padStart(2,'0')}${ampm}` : `${hr}${ampm}`;
}

function eventToMinutes(timeStr) {
  // "14:30" -> 870
  if (!timeStr) return null;
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + (m || 0);
}

// Build custom time picker HTML
function buildTimePicker(idPrefix, value) {
  const [hVal, mVal] = value ? value.split(':').map(Number) : [9, 0];
  const ampm = hVal >= 12 ? 'pm' : 'am';
  const hr12 = hVal % 12 || 12;

  const hours = Array.from({length:12},(_,i)=>i+1).map(h =>
    `<option value="${h}"${h===hr12?'selected':''}>${h}</option>`).join('');
  const mins = ['00','15','30','45'].map(m =>
    `<option value="${m}"${parseInt(m)===mVal?'selected':''}>${m}</option>`).join('');
  const ampmOpts = ['am','pm'].map(a =>
    `<option value="${a}"${a===ampm?'selected':''}>${a}</option>`).join('');

  const onChange = idPrefix === 'tp-start' ? 'onchange="syncEndTime()"' : '';
  return `<div class="time-picker">
    <select id="${idPrefix}-h" ${onChange}>${hours}</select>
    <span class="tp-sep">:</span>
    <select id="${idPrefix}-m" ${onChange}>${mins}</select>
    <select id="${idPrefix}-ampm" ${onChange}>${ampmOpts}</select>
  </div>`;
}

// Read time picker value as "HH:MM" 24h string
function getTimePicker(idPrefix) {
  const h = parseInt(document.getElementById(`${idPrefix}-h`)?.value || 0);
  const m = document.getElementById(`${idPrefix}-m`)?.value || '00';
  const ampm = document.getElementById(`${idPrefix}-ampm`)?.value || 'am';
  let h24 = h % 12;
  if (ampm === 'pm') h24 += 12;
  return `${String(h24).padStart(2,'0')}:${m}`;
}

// Set time picker to a given "HH:MM" 24h value
function setTimePicker(idPrefix, value) {
  const [hVal, mVal] = value.split(':').map(Number);
  const ampm = hVal >= 12 ? 'pm' : 'am';
  const hr12 = hVal % 12 || 12;
  const hEl = document.getElementById(`${idPrefix}-h`);
  const mEl = document.getElementById(`${idPrefix}-m`);
  const aEl = document.getElementById(`${idPrefix}-ampm`);
  if (hEl) hEl.value = hr12;
  if (mEl) mEl.value = String(mVal).padStart(2,'0');
  if (aEl) aEl.value = ampm;
}

// Auto-set end time to 1hr after start
function syncEndTime() {
  const start = getTimePicker('tp-start');
  const [h, m] = start.split(':').map(Number);
  const endMins = (h * 60 + m + 60) % (24 * 60);
  const endH = Math.floor(endMins / 60);
  const endM = endMins % 60;
  setTimePicker('tp-end', `${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`);
}



function renderWeek() {
  const days = getWeekDays();
  const title = `${MONTHS[days[0].getMonth()]} ${days[0].getDate()} – ${MONTHS[days[6].getMonth()]} ${days[6].getDate()}, ${days[6].getFullYear()}`;
  document.getElementById('cal-title').textContent = title;

  const weekStartStr = dateStr(days[0]);
  const weekEndStr = dateStr(days[6]);

  // ── HEADER ROW ──────────────────────────────
  const headerRow = document.getElementById('week-header-row');
  headerRow.innerHTML = '';
  // gutter spacer
  const gutterHdr = document.createElement('div');
  gutterHdr.className = 'wv-time-gutter';
  gutterHdr.style.cssText = 'border-right:1px solid var(--border);border-bottom:none;';
  headerRow.appendChild(gutterHdr);

  days.forEach(d => {
    const isToday = sameDay(d, state.today);
    const hasPTO = state.events.some(e => eventSpansDate(e, d) && e.color === 'purple');
    const div = document.createElement('div');
    div.className = 'wv-day-header' + (hasPTO ? ' pto' : '');
    div.style.cursor = 'pointer';
    div.innerHTML = `<div class="wdh-name">${DAYS[d.getDay()]}</div>
      <div class="wdh-date${isToday?' today':''}">${d.getDate()}</div>`;
    div.onclick = () => openModalWithDate('event', dateStr(d));
    headerRow.appendChild(div);
  });

  // ── ALL-DAY STRIP ───────────────────────────
  // All-day = no startTime, single day events + multi-day spanning events
  const alldayGrid = document.getElementById('week-allday-grid');
  alldayGrid.innerHTML = '';

  // multi-day spanning events (live in overlay over all-day grid)
  const spannedEvents = state.events.filter(e => {
    const end = e.endDate || e.date;
    return end > e.date && days.some(d => eventSpansDate(e, d));
  });

  // single-day untimed events per column
  days.forEach(d => {
    const ds = dateStr(d);
    const col = document.createElement('div');
    const hasPTO = state.events.some(e => eventSpansDate(e, d) && e.color === 'purple');
    col.className = 'wv-allday-col' + (hasPTO ? ' pto' : '');
    col.onclick = () => openModalWithDate('event', ds);
    // single-day untimed events
    state.events
      .filter(e => e.date === ds && (!e.endDate || e.endDate === e.date) && !e.startTime)
      .forEach(e => {
        const bullet = document.createElement('div');
        bullet.className = 'wv-allday-bullet';
        bullet.innerHTML = `<div class="wv-allday-dot" style="background:${colorDot(e.color)}"></div><div class="wv-allday-text">${e.title}</div>`;
        bullet.onclick = evt => { evt.stopPropagation(); openEventEdit(e.id); };
        col.appendChild(bullet);
      });
    alldayGrid.appendChild(col);
  });

  // spanning bars overlay in all-day strip
  let overlay = alldayGrid.querySelector('.wv-allday-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'wv-allday-overlay';
    alldayGrid.style.position = 'relative';
    alldayGrid.appendChild(overlay);
  }
  overlay.innerHTML = '';
  if (spannedEvents.length > 0) {
    const rows = [];
    spannedEvents.forEach(e => {
      const s = Math.max(0, days.findIndex(d => dateStr(d) >= e.date));
      const en = days.reduce((last, d, i) => dateStr(d) <= (e.endDate||e.date) ? i : last, -1);
      if (en < 0) return;
      let placed = false;
      for (const row of rows) {
        if (!row.some(item => !(item.en < s || item.s > en))) { row.push({e,s,en}); placed=true; break; }
      }
      if (!placed) rows.push([{e,s,en}]);
    });
    rows.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'month-bar-row';
      const slots = Array(7).fill(null);
      row.forEach(({e,s,en}) => { for (let i=s;i<=en;i++) slots[i]={e,s,en}; });
      let i = 0;
      while (i < 7) {
        const slot = slots[i];
        if (!slot) { const emp=document.createElement('div'); emp.className='month-bar empty'; rowEl.appendChild(emp); i++; }
        else {
          const span = slot.en - slot.s + 1;
          const isStart = slot.s === i;
          const isSolo = slot.e.date >= weekStartStr && (slot.e.endDate||slot.e.date) <= weekEndStr && slot.e.date === (slot.e.endDate||slot.e.date);
          const bar = document.createElement('div');
          bar.className = `month-bar ${slot.e.color}${isSolo?' solo':isStart?' start':''}`;
          if (!isSolo && slot.en === i+span-1) bar.className += ' end';
          bar.style.gridColumn = `${i+1} / span ${span}`;
          bar.textContent = isStart ? slot.e.title : '';
          bar.onclick = evt => { evt.stopPropagation(); openEventEdit(slot.e.id); };
          rowEl.appendChild(bar);
          i += span;
        }
      }
      overlay.appendChild(rowEl);
    });
    // expand allday strip height for spanning bars
    const alldayRow = document.getElementById('week-allday-row');
    alldayRow.style.minHeight = (28 + rows.length * 16) + 'px';
  }

  // ── TIME GRID ───────────────────────────────
  const timeBody = document.getElementById('week-time-body');
  timeBody.innerHTML = '';

  const { dayStart, dayEnd } = getVisibleHourRange(days);
  const hours = Array.from({length: dayEnd - dayStart}, (_, i) => i + dayStart);

  // time label column
  const timeCol = document.createElement('div');
  timeCol.className = 'wv-time-col';
  hours.forEach(h => {
    const lbl = document.createElement('div');
    lbl.className = 'wv-time-label';
    lbl.textContent = fmtTime(h, 0);
    timeCol.appendChild(lbl);
  });
  timeBody.appendChild(timeCol);

  // day columns
  const daysGrid = document.createElement('div');
  daysGrid.className = 'wv-days-grid';

  days.forEach(d => {
    const ds = dateStr(d);
    const hasPTO = state.events.some(e => eventSpansDate(e, d) && e.color === 'purple');
    const col = document.createElement('div');
    col.className = 'wv-day-col' + (hasPTO ? ' pto' : '');

    // hour cells (clickable)
    hours.forEach(h => {
      const cell = document.createElement('div');
      cell.className = 'wv-hour-cell';
      cell.onclick = () => openModalWithDate('event', ds, h);
      col.appendChild(cell);
    });

    // timed events for this day
    const timedEvents = state.events.filter(e =>
      e.date === ds && (!e.endDate || e.endDate === ds) && e.startTime
    );

    timedEvents.forEach(e => {
      const startMins = eventToMinutes(e.startTime);
      const endMins = eventToMinutes(e.endTime) || startMins + 60;
      const startHour = startMins / 60;
      const endHour = endMins / 60;
      if (startHour >= dayEnd || endHour <= dayStart) return;

      const clampedStart = Math.max(startHour, dayStart);
      const clampedEnd = Math.min(endHour, dayEnd);
      const top = (clampedStart - dayStart) * HOUR_HEIGHT;
      const trueHeight = (clampedEnd - clampedStart) * HOUR_HEIGHT;
      const visualHeight = Math.max(trueHeight, HOUR_HEIGHT * 0.5); // min 30min visual

      const block = document.createElement('div');
      block.className = `wv-event-block ${e.color}`;
      block.style.cssText = `top:${top}px;height:${visualHeight}px;`;
      block.innerHTML = `<div class="wv-dur-bar" style="height:${trueHeight}px"></div><div class="ev-title">${e.title}</div>`;
      block.onclick = evt => { evt.stopPropagation(); openEventEdit(e.id); };
      col.appendChild(block);
    });

    daysGrid.appendChild(col);
  });

  timeBody.appendChild(daysGrid);
}

function colorDot(color) {
  const map = { green:'var(--accent)', orange:'var(--accent2)', red:'#c0392b', yellow:'#f1c40f', blue:'#2e86c1', magenta:'#8e44ad', purple:'#9333ea', gray:'#bbb' };
  return map[color] || '#bbb';
}

function renderMonth() {
  const base = getMonthBase();
  document.getElementById('cal-title').textContent = `${MONTHS[base.getMonth()]} ${base.getFullYear()}`;

  // DOW headers
  const dowRow = document.getElementById('month-dow-row');
  dowRow.innerHTML = DAYS.map(d => `<div class="month-dow">${d[0]}</div>`).join('');

  // build flat list of all cells for this month view
  const firstDay = base.getDay();
  const daysInMonth = new Date(base.getFullYear(), base.getMonth()+1, 0).getDate();
  const prevDays = new Date(base.getFullYear(), base.getMonth(), 0).getDate();
  const cells = [];
  for (let i = firstDay-1; i >= 0; i--)
    cells.push({ d: new Date(base.getFullYear(), base.getMonth()-1, prevDays-i), other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ d: new Date(base.getFullYear(), base.getMonth(), d), other: false });
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++)
    cells.push({ d: new Date(base.getFullYear(), base.getMonth()+1, i), other: true });

  // split into weeks
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

  const container = document.getElementById('month-weeks-container');
  container.innerHTML = '';

  weeks.forEach(week => {
    const weekRow = document.createElement('div');
    weekRow.className = 'month-week-row';

    // day cells (date numbers + click handler only, no events inline)
    week.forEach(({ d, other }) => {
      const hasPTO = state.events.some(e => eventSpansDate(e, d) && e.color === 'purple');
      const cell = document.createElement('div');
      cell.className = `month-cell${other?' other-month':''}${sameDay(d,state.today)?' today':''}${hasPTO?' pto':''}`;
      cell.onclick = () => openModalWithDate('event', dateStr(d));
      const dayDiv = document.createElement('div');
      dayDiv.className = 'mday';
      dayDiv.textContent = d.getDate();
      cell.appendChild(dayDiv);
      weekRow.appendChild(cell);
    });

    // event overlay layer
    const weekStart = week[0].d;
    const weekEnd = week[6].d;
    const weekStartStr = dateStr(weekStart);
    const weekEndStr = dateStr(weekEnd);

    // find all events visible in this week
    // Sort: multi-day/all-day first, then timed single-day sorted by time
    const allVisibleEvents = state.events.filter(e => {
      const end = e.endDate || e.date;
      return e.date <= weekEndStr && end >= weekStartStr;
    });
    const multiOrAllDay = allVisibleEvents.filter(e => (e.endDate && e.endDate > e.date) || !e.startTime);
    const timedSingleDay = allVisibleEvents
      .filter(e => e.startTime && (!e.endDate || e.endDate === e.date))
      .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));

    // unified packing — all-day first, then timed, no gap between them
    const allEventsOrdered = [...multiOrAllDay, ...timedSingleDay];

    if (allEventsOrdered.length > 0) {
      const rows = [];
      allEventsOrdered.forEach(e => {
        const end = e.endDate || e.date;
        const s = Math.max(0, week.findIndex(c => dateStr(c.d) >= e.date));
        const en = e.startTime
          ? week.findIndex(c => dateStr(c.d) === e.date) // single-day timed
          : week.reduce((last, c, i) => dateStr(c.d) <= end ? i : last, -1);
        if (en < 0 || s < 0) return;
        let placed = false;
        for (const row of rows) {
          if (!row.some(item => !(item.en < s || item.s > en))) {
            row.push({ e, s, en }); placed = true; break;
          }
        }
        if (!placed) rows.push([{ e, s, en }]);
      });

      const layer = document.createElement('div');
      layer.className = 'month-event-layer';

      rows.forEach(row => {
        const barRow = document.createElement('div');
        barRow.className = 'month-bar-row';
        const slots = Array(7).fill(null);
        row.forEach(({ e, s, en }) => {
          for (let i = s; i <= en; i++) slots[i] = { e, s, en };
        });

        let i = 0;
        while (i < 7) {
          const slot = slots[i];
          if (!slot) {
            const empty = document.createElement('div');
            empty.className = 'month-bar empty';
            barRow.appendChild(empty);
            i++;
          } else {
            const isTimed = !!slot.e.startTime;
            const span = slot.en - slot.s + 1;
            const isStart = slot.s === i;
            const end = slot.e.endDate || slot.e.date;
            const isSolo = isTimed || (slot.e.date >= weekStartStr && end <= weekEndStr && slot.e.date === end);
            const bar = document.createElement('div');
            bar.className = `month-bar ${slot.e.color}${isSolo ? ' solo' : isStart ? ' start' : ''}`;
            if (!isSolo && slot.en === i + span - 1) bar.className += ' end';
            bar.style.gridColumn = `${i + 1} / span ${span}`;
            if (isTimed) {
              // show time prefix for timed events
              const t = slot.e.startTime.split(':');
              const h = parseInt(t[0]), m = parseInt(t[1]);
              const label = fmtTime(h, m);
              bar.textContent = isStart ? `${label} ${slot.e.title}` : '';
            } else {
              bar.textContent = isStart ? slot.e.title : '';
            }
            bar.onclick = evt => { evt.stopPropagation(); openEventEdit(slot.e.id); };
            barRow.appendChild(bar);
            i += span;
          }
        }
        layer.appendChild(barRow);
      });

      weekRow.appendChild(layer);
    }

    container.appendChild(weekRow);
  });
}

function makeMonthCell(d, other) {
  // kept for compatibility but month rendering now handled inline above
  return document.createElement('div');
}

function setView(v) {
  state.calView = v;
  document.getElementById('week-view').style.display = v==='week'?'':'none';
  document.getElementById('month-view').style.display = v==='month'?'':'none';
  document.getElementById('week-view-btn').classList.toggle('active', v==='week');
  document.getElementById('month-view-btn').classList.toggle('active', v==='month');
  renderCal();
  renderHabits();
}
function navCal(dir) {
  if (state.calView==='week') state.weekOffset += dir;
  else state.monthOffset += dir;
  renderCal();
  if (state.calView==='week') renderHabits();
}
function goToday() {
  state.weekOffset = 0; state.monthOffset = 0;
  renderCal();
  renderHabits();
}
function renderCal() {
  if (state.calView==='week') renderWeek();
  else renderMonth();
}

// ──────────────────────────────────────────────
// EDIT MODE / DRAG REORDER
// ──────────────────────────────────────────────
const editState = {};

function toggleEdit(listId, btn) {
  const el = document.getElementById(listId);
  const isActive = btn.classList.toggle('active');
  btn.textContent = isActive ? 'done' : 'edit';
  if (isActive) {
    el.classList.add('edit-mode');
  } else {
    el.classList.remove('edit-mode');
  }
}

function setupDrag(container, arr, renderFn) {
  setupTouchReorder(container, arr, renderFn);
}
function setupDragByIndex(container, arr, renderFn) {
  setupTouchReorder(container, arr, renderFn);
}

function setupTouchReorder(container, arr, renderFn) {
  // Remove any previous listeners by cloning the container's handle elements
  // We attach per-handle listeners directly, so we query fresh each call
  const handles = container.querySelectorAll('.drag-handle');
  handles.forEach((handle, _) => {
    // Clone to strip old listeners
    const fresh = handle.cloneNode(true);
    handle.parentNode.replaceChild(fresh, handle);
  });

  let srcIdx = null;

  container.querySelectorAll('.drag-handle').forEach(handle => {
    let longPress = null;

    const getRows = () => [...container.querySelectorAll('[draggable="true"]')];

    const startDrag = (e) => {
      e.preventDefault();
      const row = handle.closest('[draggable="true"]');
      if (!row) return;
      srcIdx = getRows().indexOf(row);
      row.style.opacity = '0.4';
      row.style.outline = '2px solid var(--accent)';
      row.style.borderRadius = '6px';

      // highlight all other rows as drop targets
      getRows().forEach((r, i) => {
        if (i === srcIdx) return;
        r.style.cursor = 'pointer';
        r.addEventListener('click', onDropTarget);
        r.addEventListener('touchend', onDropTarget);
      });
    };

    const onDropTarget = function(e) {
      e.stopPropagation();
      const rows = getRows();
      const destIdx = rows.indexOf(this);
      if (srcIdx === null || destIdx === srcIdx) return cleanup();

      // swap in array
      const [moved] = arr.splice(srcIdx, 1);
      arr.splice(destIdx, 0, moved);
      cleanup();
      renderFn();
      saveData();
      setTimeout(() => {
        document.querySelectorAll('.edit-btn.active').forEach(btn => {
          const m = btn.getAttribute('onclick').match(/'([^']+)'/);
          if (m) { const el = document.getElementById(m[1]); if (el) el.classList.add('edit-mode'); }
        });
      }, 0);
    };

    const cleanup = () => {
      srcIdx = null;
      getRows().forEach(r => {
        r.style.opacity = '';
        r.style.outline = '';
        r.style.borderRadius = '';
        r.style.cursor = '';
        r.removeEventListener('click', onDropTarget);
        r.removeEventListener('touchend', onDropTarget);
      });
    };

    // long press to enter drag mode
    handle.addEventListener('touchstart', (e) => {
      longPress = setTimeout(() => startDrag(e), 300);
    }, { passive: true });
    handle.addEventListener('touchend', () => clearTimeout(longPress));
    handle.addEventListener('touchmove', () => clearTimeout(longPress), { passive: true });
    handle.addEventListener('mousedown', (e) => startDrag(e));
  });
}

function deleteItem(arr, id, renderFn) {
  const idx = arr.findIndex(x => x.id === id);
  if (idx !== -1) arr.splice(idx, 1);
  renderFn();
  saveData();
  // re-apply edit mode to re-rendered list
  setTimeout(() => {
    document.querySelectorAll('.edit-btn.active').forEach(btn => {
      const listId = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
      const el = document.getElementById(listId);
      if (el) el.classList.add('edit-mode');
    });
  }, 0);
}


// ──────────────────────────────────────────────
// EVENT EDIT
// ──────────────────────────────────────────────
function openEventEdit(id) {
  const e = state.events.find(x => x.id === id);
  if (!e) return;
  state.modalType = 'event-edit';
  state.editingEventId = id;
  document.getElementById('modal-title').textContent = 'Edit Event';
  const hasTimes = !!e.startTime;
  document.getElementById('modal-body').innerHTML = `
    <div class="form-field"><label>Title</label><input id="f-title" value="${e.title}"></div>
    <div class="form-row">
      <div class="form-field"><label>Start Date</label><input id="f-date" type="date" value="${e.date}" onchange="const en=document.getElementById('f-enddate');if(en&&en.value<=this.value)en.value=this.value;"></div>
      <div class="form-field"><label>End Date</label><input id="f-enddate" type="date" value="${e.endDate||e.date}"></div>
    </div>
    <div class="form-field" style="display:flex;align-items:center;gap:8px;padding:4px 0">

function deleteEvent(id) {

function fmtMins(mins) {
  if (!mins) return '0m';
  const h = Math.floor(mins/60), m = mins%60;
  return h && m ? `${h}h${m}m` : h ? `${h}h` : `${m}m`;
}

function getDayGoalMins(h, dow) {
  if (!h.goalType || h.goalType==='none') return null;
  if (h.goalType==='daily') return h.goalMins||0;
  if (h.goalType==='dayspec') return (h.dayGoals||[])[dow]??0;
  return null; // weekly handled separately
}

function getWeekGoalMins(h) {
  if (h.goalType==='weekly') return h.goalMins||0;
  return null;
}

function getWeekTotalMins(h, weekDays) {
  return weekDays.reduce((sum, d) => sum + (parseInt(h.completions[dateStr(d)])||0), 0);
}

function calcStreak(h) {
  if (!h.completions) return 0;
  if (h.type === 'monthly') {
    // count consecutive months
    let streak = 0;
    const d = new Date(state.today.getFullYear(), state.today.getMonth(), 1);
    while(true) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (h.completions[key]) { streak++; d.setMonth(d.getMonth()-1); }
      else break;
    }
    return streak;
  }
  if (h.type === 'duration' && h.goalType === 'weekly') {
    // streak = consecutive weeks where weekly goal met
    let streak = 0;
    let weekStart = startOfWeek(state.today);
    for (let w=0; w<52; w++) {
      const days = Array.from({length:7},(_,i)=>offsetDay(weekStart,i-7*w));
      const total = days.reduce((s,d)=>s+(parseInt(h.completions[dateStr(d)])||0),0);
      if (total >= (h.goalMins||0)) streak++;
      else break;
    }
    return streak;
  }
  // daily streak
  let streak = 0;
  const d = new Date(state.today);
  while(true) {
    const ds = dateStr(d);
    const dow = d.getDay();
    if (h.type==='duration') {
      const dayGoal = h.goalType==='dayspec' ? ((h.dayGoals||[])[dow]??0) : (h.goalType==='daily'?h.goalMins:0);
      const logged = parseInt(h.completions[ds])||0;
      if (dayGoal===0) { d.setDate(d.getDate()-1); continue; } // rest day, skip
      if (logged > 0) { streak++; d.setDate(d.getDate()-1); } else break;
    } else {
      if (h.completions[ds]) { streak++; d.setDate(d.getDate()-1); } else break;
    }
    if (streak > 365) break;
  }
  return streak;
}

function renderHabits() {
  const el = document.getElementById('habits-list');
  const wasEdit = el.classList.contains('edit-mode');
  const weekDays = getWeekDays();
  const isMonthView = state.calView === 'month';

  el.innerHTML = state.habits.map(h => {
    const type = h.type || 'check';
    const typeTag = `<span class="habit-type-tag ${type}">${type==='check'?'◇':type==='duration'?'◷':'◫'}</span>`;
    const nameEl = isMonthView
      ? `<span class="habit-name habit-name-link" onclick="openHabitDetail(${h.id})">${h.name}</span>`
      : `<span class="habit-name">${h.name}</span>`;

    if (type === 'monthly') {
      const base = getMonthBase();
      const key = `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}`;
      const done = h.completions[key];
      const monthLabel = `${MONTHS[base.getMonth()].slice(0,3)} ${base.getFullYear()}`;
      return `<div class="habit-row" draggable="true" data-id="${h.id}">
        <span class="drag-handle">⠿</span>
        ${typeTag}
        ${nameEl}
        <button class="habit-edit-btn" onclick="openHabitEditModal(${h.id})">✎</button>
        <div class="monthly-toggle">
          <div class="monthly-check${done?' done':''}" onclick="toggleMonthlyHabit(${h.id},'${key}')">
            ${done?'✓':''}
          </div>
          <span class="monthly-month">${monthLabel}</span>
        </div>
        <button class="delete-btn" onclick="deleteItem(state.habits,${h.id},renderHabits)">×</button>
      </div>`;
    }

    if (type === 'duration') {
      const weeklyGoal = getWeekGoalMins(h);
      const weekTotal = getWeekTotalMins(h, weekDays);
      const days = weekDays.map(d => {
        const ds = dateStr(d);
        const logged = parseInt(h.completions[ds])||0;
        const dow = d.getDay();
        const dayGoal = getDayGoalMins(h, dow);
        let cls = '', label = '';
        if (logged > 0) {
          label = fmtMins(logged);
          cls = (dayGoal !== null) ? (logged >= dayGoal ? 'dur-logged' : 'dur-partial') : 'dur-logged';
        } else if (dayGoal === 0) {
          cls = 'dur-rest'; label = 'SMTWTFS'[d.getDay()];
        } else {
          label = 'SMTWTFS'[d.getDay()];
        }
        return `<div class="hday ${cls}" onclick="openDurSheet(${h.id},'${ds}')" style="font-size:7px">${label}</div>`;
      }).join('');

      let weekBar = '';
      if (weeklyGoal) {
        const pct = Math.min(100, Math.round(weekTotal/weeklyGoal*100));
        const cls = weekTotal >= weeklyGoal ? '' : 'partial';
        weekBar = `<div class="habit-weekly-bar" style="width:100%">
          <div class="habit-weekly-track"><div class="habit-weekly-fill ${cls}" style="width:${pct}%"></div></div>
          <span class="habit-weekly-label">${fmtMins(weekTotal)}/${fmtMins(weeklyGoal)}</span>
        </div>`;
      }

      return `<div class="habit-row duration-row" draggable="true" data-id="${h.id}">
        <span class="drag-handle">⠿</span>
        ${typeTag}
        ${nameEl}
        <button class="habit-edit-btn" onclick="openHabitEditModal(${h.id})">✎</button>
        <div class="habit-days">${days}</div>
        <button class="delete-btn" onclick="deleteItem(state.habits,${h.id},renderHabits)">×</button>
        ${weekBar}
      </div>`;
    }

    // check habit
    const days = weekDays.map(d => {
      const ds = dateStr(d);
      const done = h.completions && h.completions[ds];
      return `<div class="hday${done?' done':''}" onclick="toggleHabit(${h.id},'${ds}')">${'SMTWTFS'[d.getDay()]}</div>`;
    }).join('');

    return `<div class="habit-row" draggable="true" data-id="${h.id}">
      <span class="drag-handle">⠿</span>
      ${typeTag}
      ${nameEl}
      <button class="habit-edit-btn" onclick="openHabitEditModal(${h.id})">✎</button>
      <div class="habit-days">${days}</div>
      <button class="delete-btn" onclick="deleteItem(state.habits,${h.id},renderHabits)">×</button>
    </div>`;
  }).join('');

  // month view: duration summaries
  if (isMonthView) {
    const base = getMonthBase();
    const durationHabits = state.habits.filter(h=>h.type==='duration');
    if (durationHabits.length > 0) {
      const summary = document.createElement('div');
      summary.style = 'border-top:1px solid var(--border);margin-top:10px;padding-top:8px';
      summary.innerHTML = `<div style="font-size:9px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${MONTHS[base.getMonth()]} summary</div>` +
        durationHabits.map(h => {
          const total = Object.entries(h.completions).filter(([ds]) => ds.startsWith(`${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}`)).reduce((s,[,v])=>s+(parseInt(v)||0),0);
          return `<div class="month-summary-row"><span>${h.name}</span><span class="month-summary-val">${fmtMins(total)}</span></div>`;
        }).join('');
      el.appendChild(summary);
    }
  }

  if (wasEdit) el.classList.add('edit-mode');
  setupDrag(el, state.habits, renderHabits);
}

function toggleHabit(id, ds) {
  const h = state.habits.find(x=>x.id===id);
  if (!h.completions) h.completions = {};
  h.completions[ds] = h.completions[ds] ? 0 : 1;
  renderHabits(); saveData();
}

  const h = state.habits.find(x=>x.id===id);
  if (!h.completions) h.completions = {};
  h.completions[key] = h.completions[key] ? 0 : 1;
  renderHabits(); saveData();
}

function saveHabitEdit() {
  const h = state.habits.find(x => x.id === state.editingHabitId);
  if (!h) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  h.name = g('f-title') || h.name;
  const htype = document.querySelector('.htype-btn.active')?.id?.replace('ht-','') || h.type;
  h.type = htype;
  if (htype === 'duration') {
    h.increments = [1,2,3,4,5,6].map(n => (parseInt(g(`f-ih${n}`))||0)*60 + (parseInt(g(`f-im${n}`))||0)).filter(v=>v>0);
    const gtype = document.querySelector('.gtype-btn.active')?.id?.replace('gt-','') || 'none';
    h.goalType = gtype;
    if (gtype==='daily') h.goalMins = (parseInt(g('f-gh'))||0)*60 + (parseInt(g('f-gm'))||0);
    else if (gtype==='weekly') h.goalMins = (parseInt(g('f-gwh'))||0)*60 + (parseInt(g('f-gwm'))||0);
    else if (gtype==='dayspec') h.dayGoals = [0,1,2,3,4,5,6].map(i => (parseInt(g(`f-gdh${i}`))||0)*60 + (parseInt(g(`f-gdm${i}`))||0));
  }
  renderHabits();
  saveData();
}


function openHabitDetail(id) {
  const h = state.habits.find(x => x.id === id);
  if (!h) return;
  const base = getMonthBase();
  const yr = base.getFullYear();
  const mo = base.getMonth();
  const monthKey = `${yr}-${String(mo+1).padStart(2,'0')}`;
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const firstDow = new Date(yr, mo, 1).getDay();
  const type = h.type || 'check';

  document.getElementById('habit-detail-title').textContent = h.name;
  document.getElementById('habit-detail-month').textContent = `${MONTHS[mo]} ${yr}`;

  // build calendar grid
  const grid = document.getElementById('habit-detail-grid');
  grid.innerHTML = '';
  // DOW headers
  ['S','M','T','W','T','F','S'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'habit-cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  // filler cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'habit-cal-cell filler';
    grid.appendChild(el);
  }
  // day cells
  let completedDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const val = h.completions[ds];
    const el = document.createElement('div');
    let cls = 'empty', sublabel = '';
    if (type === 'duration') {
      const logged = parseInt(val)||0;
      const dow = new Date(yr, mo, d).getDay();
      const dayGoal = getDayGoalMins(h, dow);
      if (logged > 0) {
        cls = 'dur-detail'; // always grey for duration in detail view
        sublabel = fmtMins(logged);
        completedDays++;
      } else if (dayGoal === 0) {
        cls = 'filler';
      }
    } else {
      if (val) { cls = 'done'; completedDays++; }
      // check habits: tap to toggle
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => {
        if (!h.completions) h.completions = {};
        h.completions[ds] = h.completions[ds] ? 0 : 1;
        saveData();
        renderHabits();
        openHabitDetail(id); // re-render popup
      });
    }
    el.className = `habit-cal-cell ${cls}`;
    el.innerHTML = `<span>${d}</span>${sublabel ? `<span style="font-size:7px">${sublabel}</span>` : ''}`;
    grid.appendChild(el);
  }

  // stats
  const streak = calcStreak(h);
  // longest streak in this month
  let longestStreak = 0, cur = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const val = h.completions[ds];
    const active = type === 'duration' ? (parseInt(val)||0) > 0 : !!val;
    if (active) { cur++; longestStreak = Math.max(longestStreak, cur); }
    else cur = 0;
  }

  const statsEl = document.getElementById('habit-detail-stats');
  const streakUnit = h.type === 'monthly' ? 'mo' : 'd';
  statsEl.innerHTML = `
    <div class="habit-stat-box">
      <div class="habit-stat-val">${completedDays}</div>
      <div class="habit-stat-label">Days this month</div>
    </div>
    <div class="habit-stat-box">
      <div class="habit-stat-val">${longestStreak}${streakUnit}</div>
      <div class="habit-stat-label">Longest streak</div>
    </div>
    <div class="habit-stat-box" style="grid-column:span 2">
      <div class="habit-stat-val">${streak}${streakUnit}</div>
      <div class="habit-stat-label">Current streak (all time)</div>
    </div>
  `;

  document.getElementById('habit-detail-overlay').classList.add('open');
}

  if (e && e.target !== document.getElementById('habit-detail-overlay')) return;
  document.getElementById('habit-detail-overlay').classList.remove('open');
}

function getMonthKey() {
  const b = new Date(state.today.getFullYear(), state.today.getMonth(), 1);
  return `${b.getFullYear()}-${String(b.getMonth()+1).padStart(2,'0')}`;
}

function getCatMonthTotal(cat) {
  const mk = getMonthKey();
  return (cat.charges||[]).filter(c=>c.date.startsWith(mk)).reduce((s,c)=>s+c.amount,0);
}

function renderFinance() {
  const cats = state.budget.categories;
  const totalSpent = cats.reduce((s,c)=>s+getCatMonthTotal(c),0);
  const totalLimit = cats.reduce((s,c)=>s+(c.limit||0),0);
  const pctTotal = totalLimit ? Math.min(100,Math.round(totalSpent/totalLimit*100)) : 0;
  const clsTotal = pctTotal>=100?'over':'';

  document.getElementById('finance-summary').innerHTML = `
    <div class="finance-summary-bar">
      <div><div class="fin-label">${MONTHS[new Date().getMonth()]} spent</div><div class="fin-val ${clsTotal}">$${totalSpent.toFixed(2)}</div></div>
      <div style="text-align:right"><div class="fin-label">of $${totalLimit} budgeted</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${pctTotal}%</div>
      </div>
    </div>`;

  const budgetEl = document.getElementById('budget-rows');
  const wasEdit = budgetEl.classList.contains('edit-mode');
  budgetEl.innerHTML = cats.map((c,i)=>{
    const spent = getCatMonthTotal(c);
    const pct = c.limit ? Math.min(100,Math.round(spent/c.limit*100)) : 0;
    const cls = pct>=100?'over':pct>=85?'warn':'ok';
    return `<div class="budget-row" draggable="true" data-idx="${i}" onclick="openChargePopup(${i})">
      <span class="drag-handle">⠿</span>
      <span class="budget-cat">${c.name}</span>

      <button class="delete-btn" onclick="event.stopPropagation();deleteBudgetCat(${i})">×</button>

  }).join('');
  if (wasEdit) budgetEl.classList.add('edit-mode');
  setupDragByIndex(budgetEl, cats, renderFinance);
}

function renameCat(newName) {
  const name = newName.trim();
  if (!name || currentCatIdx === null) return;
  state.budget.categories[currentCatIdx].name = name;
  renderFinance();
  saveData();
}

function renderChargeList(cat, mk) {
  const charges = (cat.charges||[]).filter(c=>c.date.startsWith(mk)).slice().reverse();
  document.getElementById('charge-list').innerHTML = charges.length ? charges.map((c,i)=>`
    <div class="charge-item">
      <span class="charge-amount">$${c.amount.toFixed(2)}</span>
      <span class="charge-note">${c.note||''}</span>
      <span class="charge-date">${c.date.slice(5)}</span>

    </div>`).join('') :
    `<div style="font-size:12px;color:var(--muted);padding:12px 0">No charges this month yet.</div>`;
}

function addCharge() {
  const amt = parseFloat(document.getElementById('charge-amount').value);
  if (!amt || amt <= 0) return;
  const note = document.getElementById('charge-note').value;
  const cat = state.budget.categories[currentCatIdx];
  if (!cat.charges) cat.charges = [];
  cat.charges.push({ amount: amt, note, date: dateStr(state.today) });
  const mk = getMonthKey();
  const spent = getCatMonthTotal(cat);
  document.getElementById('charge-cat-summary').textContent =
    `$${spent.toFixed(2)} spent this month${cat.limit?' · $'+cat.limit+' limit':''}`;
  renderChargeList(cat, mk);
  renderFinance();
  saveData();
  document.getElementById('charge-amount').value = '';
  document.getElementById('charge-note').value = '';
  document.getElementById('charge-amount').focus();

function deleteCharge(chargeIdx) {

  saveData();

function saveModal() {
  const t = state.modalType;
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  if (t==='event-edit') {
    const e = state.events.find(x => x.id === state.editingEventId);
    if (e) {
      e.title = g('f-title') || e.title;
      e.date = g('f-date') || e.date;
      e.endDate = g('f-enddate') || e.date;
      if (e.endDate < e.date) e.endDate = e.date;
      e.color = g('f-color') || e.color;
      const timed = document.getElementById('f-timed')?.checked;
      if (timed) {
        e.startTime = document.getElementById('f-timed')?.checked ? getTimePicker('tp-start') : null;
        e.endTime = document.getElementById('f-timed')?.checked ? getTimePicker('tp-end') : null;
      } else {
        delete e.startTime;
        delete e.endTime;
      }
      renderCal();
      saveData();
    }
    closeModal();
    return;
  }
  if (t==='habit-edit') {
    saveHabitEdit();
    closeModal();
    return;
  }
  if (t==='event') {
    const title = g('f-title');
    if (!title) return;
    const startDate = g('f-date');
    const endDate = g('f-enddate') || startDate;
    const timed = document.getElementById('f-timed')?.checked;
    const ev = { id: Date.now(), title, date: startDate, endDate: endDate >= startDate ? endDate : startDate, color: g('f-color')||'gray' };
    if (timed) {
      ev.startTime = document.getElementById('f-timed')?.checked ? getTimePicker('tp-start') : null;
      ev.endTime = document.getElementById('f-timed')?.checked ? getTimePicker('tp-end') : null;
    }
    state.events.push(ev);
    renderCal();
  } else if (t==='habit') {
    const name = g('f-title'); if (!name) return;
    const htype = document.querySelector('.htype-btn.active')?.id?.replace('ht-','') || 'check';
    const habit = { id: Date.now(), name, type: htype, completions: {} };
    if (htype === 'duration') {
      habit.increments = [1,2,3,4,5,6].map(n => {
        const h = parseInt(g(`f-ih${n}`))||0;
        const m = parseInt(g(`f-im${n}`))||0;
        return h*60+m;
      }).filter(v=>v>0);
      const gtype = document.querySelector('.gtype-btn.active')?.id?.replace('gt-','') || 'none';
      habit.goalType = gtype;
      if (gtype==='daily') {
        habit.goalMins = (parseInt(g('f-gh'))||0)*60 + (parseInt(g('f-gm'))||0);
      } else if (gtype==='weekly') {
        habit.goalMins = (parseInt(g('f-gwh'))||0)*60 + (parseInt(g('f-gwm'))||0);
      } else if (gtype==='dayspec') {
        habit.dayGoals = [0,1,2,3,4,5,6].map(i =>
          (parseInt(g(`f-gdh${i}`))||0)*60 + (parseInt(g(`f-gdm${i}`))||0)
        );
      }
    }
    state.habits.push(habit);
    renderHabits();
  } else if (t==='budget') {
    const name = g('f-title'); if (!name) return;
    const limit = parseFloat(g('f-budget'))||0;
    state.budget.categories.push({ id: Date.now(), name, limit, charges: [] });
    renderFinance();
  } else if (t.startsWith('list-')) {
    const key = t.replace('list-', '');
    const title = g('f-title'); if (!title) return;
    const item = { title, note: g('f-note') };
    if (key === 'recipes' || key === 'notes') item.description = g('f-desc');
    state.lists[key].push(item);
    renderList(key);
  }
  saveData();
  closeModal();
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

      sessions: [] // { date, workoutId, exercises: { exId: [{weight, reps}] } }
    };
  }

function getLastSession(workoutId) {
  return [...(state.gym.sessions||[])].reverse().find(s => s.workoutId === workoutId);
}

function getProgressionSuggestion(ex, lastSession) {
  if (!lastSession) return null;
  const sets = lastSession.exercises[ex.id] || [];
  if (sets.length === 0) return null;
  const allHitMax = sets.every(s => s.reps >= ex.maxReps);
  const anyBelowMin = sets.some(s => s.reps < ex.minReps);
  if (allHitMax) return { type: 'progress', text: `↑ Add ${ex.incr}lbs` };
  if (anyBelowMin) return { type: 'deload', text: `↓ Deload` };
  return { type: 'hold', text: `→ Hold weight` };
}

function renderGymCard() {
  initGym();
  const el = document.getElementById('gym-card-body');
  if (!el) return;
  const sessions = state.gym.sessions || [];
  const recent = sessions.slice(-6).reverse();

  if (recent.length === 0) {
    el.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:4px 0">No sessions logged yet. Tap + to start.</div>`;
    return;
  }

  el.innerHTML = recent.map(s => {
    const w = state.gym.workouts.find(w => w.id === s.workoutId);
    if (!w) return '';
    const exCount = Object.keys(s.exercises||{}).length;

function openGymLogger(workoutId, existingDate) {
  initGym();
  const w = state.gym.workouts.find(w => w.id === workoutId);
  if (!w) return;
  const sessionDate = existingDate || dateStr(state.today);
  gymCtx = { workoutId, date: sessionDate };
  const lastSession = getLastSession(workoutId);

  // find existing session for this date if editing
  const existing = (state.gym.sessions||[]).find(s => s.workoutId === workoutId && s.date === sessionDate);

  document.getElementById('gym-popup-title').textContent = `${w.name} Day`;
  document.getElementById('gym-popup-date').textContent = sessionDate;

  document.getElementById('gym-popup-body').innerHTML = w.exercises.map(ex => {
    const suggestion = getProgressionSuggestion(ex, lastSession);
    const lastSets = lastSession?.exercises[ex.id] || [];
    const existingSets = existing?.exercises[ex.id] || [];
    // suggested weight = last weight + increment if progressing, else last weight
    const suggestedWeight = lastSets.length > 0
      ? (suggestion?.type === 'progress' ? lastSets[0].weight + ex.incr : lastSets[0].weight)
      : '';

    const setInputs = Array.from({length: ex.sets}, (_, i) => {
      const prev = lastSets[i];
      const curr = existingSets[i];
      return `<div class="gym-set-col">
        <div class="gym-set-label">Set ${i+1}</div>
        <input class="gym-set-input" id="ex-${ex.id}-w-${i}" type="number" min="0" step="2.5"
          placeholder="lbs" value="${curr?.weight ?? suggestedWeight}" style="margin-bottom:3px">
        <input class="gym-set-input" id="ex-${ex.id}-r-${i}" type="number" min="0"
          placeholder="reps" value="${curr?.reps ?? ''}">
        ${prev ? `<div class="gym-prev">${prev.weight}×${prev.reps}</div>` : '<div class="gym-prev">—</div>'}
      </div>`;
    }).join('');

    const sugTag = suggestion
      ? `<span class="gym-suggest ${suggestion.type}">${suggestion.text}</span>` : '';

    return `<div class="gym-exercise-block">
      <div class="gym-ex-header">
        <span class="gym-ex-name">${ex.name}</span>
        <span class="gym-ex-target">${ex.sets}×${ex.minReps}–${ex.maxReps}</span>
      </div>
      ${sugTag}
      <div class="gym-sets-grid">${setInputs}</div>
    </div>`;
  }).join('');
}

function openGymSession(workoutId, date) {
  openGymLogger(workoutId, date);
}

function saveGymSession() {
  initGym();
  const { workoutId, date } = gymCtx;
  if (!workoutId) return;
  const w = state.gym.workouts.find(w => w.id === workoutId);
  if (!w) return;

  const exercises = {};
  w.exercises.forEach(ex => {
    const sets = [];
    for (let i = 0; i < ex.sets; i++) {
      const wEl = document.getElementById(`ex-${ex.id}-w-${i}`);
      const rEl = document.getElementById(`ex-${ex.id}-r-${i}`);
      if (wEl && rEl && wEl.value && rEl.value) {
        sets.push({ weight: parseFloat(wEl.value), reps: parseInt(rEl.value) });
      }
    }
    if (sets.length > 0) exercises[ex.id] = sets;
  });

  // remove existing session for same date+workout if editing
  state.gym.sessions = (state.gym.sessions||[]).filter(s => !(s.workoutId === workoutId && s.date === date));
  state.gym.sessions.push({ date, workoutId, exercises });
  // sort by date
  state.gym.sessions.sort((a,b) => a.date.localeCompare(b.date));

  renderGymCard();
  saveData();
  document.getElementById('gym-overlay').classList.remove('open');
}

function applyCardLayout() {

  const cardEls = {};

    cardEls[el.dataset.cardId] = el;
  });
  layout.forEach(({ id, hidden }) => {
    const el = cardEls[id];
    if (!el) return;
    el.classList.toggle('card-hidden', !!hidden);
  });

  // hide desktop-two-col row wrappers if all their card children are hidden
  document.querySelectorAll('.desktop-two-col').forEach(row => {
    const cards = row.querySelectorAll('[data-card-id]');
    const allHidden = cards.length > 0 && [...cards].every(c => c.classList.contains('card-hidden'));

function closeArrangeCards(e) {
  if (e && e.target !== document.getElementById('arrange-overlay')) return;
  document.getElementById('arrange-overlay').classList.remove('open');
}

function setupArrangeDrag(list) {
  let srcIdx = null;
  list.querySelectorAll('.arrange-handle').forEach(handle => {
    let lp = null;
    const rows = () => [...list.querySelectorAll('.arrange-row')];
    const start = (e) => {
      if (e.preventDefault) e.preventDefault();
      const row = handle.closest('.arrange-row');
      srcIdx = rows().indexOf(row);
      row.style.opacity = '0.4';
      row.style.background = 'var(--accent-light)';
      rows().forEach((r, i) => {
        if (i === srcIdx) return;
        r.addEventListener('click', onDrop);
        r.addEventListener('touchend', onDrop);
      });
    };
    const onDrop = function() {
      const destIdx = rows().indexOf(this);
      if (srcIdx === null || destIdx === srcIdx) return cleanup();
      const layout = getCardState();
      const [moved] = layout.splice(srcIdx, 1);
      layout.splice(destIdx, 0, moved);
      applyCardLayout();
      saveData();
      cleanup();
      openArrangeCards();
    };
    const cleanup = () => {
      srcIdx = null;
      rows().forEach(r => {
        r.style.opacity = ''; r.style.background = '';
        r.removeEventListener('click', onDrop);
        r.removeEventListener('touchend', onDrop);
      });
    };
    handle.addEventListener('touchstart', () => { lp = setTimeout(() => start({}), 400); }, { passive: true });
    handle.addEventListener('touchend', () => clearTimeout(lp));
    handle.addEventListener('touchmove', () => clearTimeout(lp), { passive: true });
    handle.addEventListener('mousedown', start);
  });
}

function setupCardLongPress() {
  document.querySelectorAll('[data-card-id] .card-head').forEach(head => {
    let lp = null;
    head.addEventListener('touchstart', () => { lp = setTimeout(() => openArrangeCards(), 700); }, { passive: true });
    head.addEventListener('touchend', () => clearTimeout(lp));
    head.addEventListener('touchmove', () => clearTimeout(lp), { passive: true });
  });
}

// ── Firestore via REST ──
function firestoreUrl() {
  return `https://firestore.googleapis.com/v1/projects/life-planner-dashboard/databases/life-planner-dashboard-database/documents/users/${currentUser.uid}`;
}

async function getIdToken() {
  return currentUser ? await currentUser.getIdToken() : null;
}

// Convert JS object to Firestore REST format
function toFirestore(obj) {
  const convert = (val) => {
    if (val === null) return { nullValue: null };
    if (typeof val === 'boolean') return { booleanValue: val };
    if (typeof val === 'number') return Number.isInteger(val) ? { integerValue: String(val) } : { doubleValue: val };
    if (typeof val === 'string') return { stringValue: val };
    if (Array.isArray(val)) return { arrayValue: { values: val.map(convert) } };
    if (typeof val === 'object') return { mapValue: { fields: Object.fromEntries(Object.entries(val).map(([k,v]) => [k, convert(v)])) } };
    return { stringValue: String(val) };
  };
  return { fields: Object.fromEntries(Object.entries(obj).map(([k,v]) => [k, convert(v)])) };
}

// Convert Firestore REST format back to JS object
function fromFirestore(fields) {
  const convert = (val) => {
    if ('nullValue' in val) return null;
    if ('booleanValue' in val) return val.booleanValue;
    if ('integerValue' in val) return Number(val.integerValue);
    if ('doubleValue' in val) return val.doubleValue;
    if ('stringValue' in val) return val.stringValue;
    if ('arrayValue' in val) return (val.arrayValue.values || []).map(convert);
    if ('mapValue' in val) return fromFirestore(val.mapValue.fields || {});
    return null;
  };
  return Object.fromEntries(Object.entries(fields).map(([k,v]) => [k, convert(v)]));
}

async function saveData() {
  const data = getDataObj();
  if (currentUser) {
    try {
      const token = await getIdToken();
      const resp = await fetch(firestoreUrl(), {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(toFirestore(data))
      });
      if (!resp.ok) throw new Error(await resp.text());
      const s = document.getElementById('sync-status');
      if (s) { s.textContent = '☁'; s.style.color = 'var(--accent)'; setTimeout(() => s.style.color = 'var(--muted)', 1500); }
    } catch(e) {
      console.warn('Save failed', e);
      const s = document.getElementById('sync-status');
      if (s) { s.textContent = '⚠'; s.title = 'Save failed: ' + e.message; }
      const msg = e.message + (e.stack ? '\n' + e.stack : '');
      let banner = document.getElementById('sync-error-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'sync-error-banner';
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a0000;color:#ff8080;font-size:10px;font-family:monospace;padding:10px 12px 16px;z-index:9999;';
        document.body.appendChild(banner);
      }
      banner.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong style="color:#fff">SAVE ERROR</strong>
        <div style="display:flex;gap:8px">
          <button onclick="navigator.clipboard.writeText(this.closest('div').nextSibling.textContent).then(()=>alert('Copied!'))" style="background:#c44;color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer">Copy</button>
          <button onclick="document.getElementById('sync-error-banner').remove()" style="background:#444;color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer">✕</button>
        </div>
      </div><pre style="margin:0;white-space:pre-wrap;word-break:break-all;-webkit-user-select:text;user-select:text">${msg}</pre>`;
      try { localStorage.setItem('lifeplanner_v1', JSON.stringify(data)); } catch(_) {}
    }
  } else {
    try { localStorage.setItem('lifeplanner_v1', JSON.stringify(data)); } catch(_) {}
  }
}

async function loadData() {
  let data = null;
  if (currentUser) {
    try {
      const token = await getIdToken();
      const resp = await fetch(firestoreUrl(), {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (resp.ok) {
        const doc = await resp.json();
        if (doc.fields) data = fromFirestore(doc.fields);
      } else if (resp.status !== 404) {
        throw new Error(await resp.text());
      }
    } catch(e) {
      console.warn('Load failed', e);
      // fallback to localStorage
      try { const raw = localStorage.getItem('lifeplanner_v1'); if (raw) data = JSON.parse(raw); } catch(_) {}
    }
  } else {
    try { const raw = localStorage.getItem('lifeplanner_v1'); if (raw) data = JSON.parse(raw); } catch(_) {}
  }
  if (!data) return;
  if (data.events) state.events = data.events.map(e => { if (!e.endDate) e.endDate = e.date; return e; });
  if (data.habits) state.habits = data.habits.map(h => { if (!h.completions) h.completions = {}; if (!h.type) h.type = 'check'; return h; });
  if (data.budget) {
    state.budget = data.budget;
    state.budget.categories = (state.budget.categories||[]).map((c,i) => {
      if (!c.charges) c.charges = []; if (!c.id) c.id = i+1;
      if (c.budget && !c.limit) c.limit = c.budget; return c;
    });
  }
  if (data.gym)        state.gym        = data.gym;
  if (data.lists)      state.lists      = Object.assign({ recipes:[], shows:[], books:[], places:[], notes:[] }, data.lists);
  if (data.cardLayout) {
    // merge saved layout with any new cards added since last save
    const savedIds = new Set(data.cardLayout.map(c => c.id));
    const merged = [...data.cardLayout];
    CARD_DEFS.forEach(def => {
      if (!savedIds.has(def.id)) merged.push({ id: def.id, hidden: false });
    });
    state.cardLayout = merged;
  }
  if (data.todos) state.todos = data.todos;
}

    currentUser = user;
    if (user) {
      document.getElementById('user-avatar').src = user.photoURL || '';
      document.getElementById('user-avatar').style.display = user.photoURL ? 'block' : 'none';
      const menuName = document.getElementById('profile-menu-name');
      if (menuName) menuName.textContent = user.displayName || user.email || '';
      document.getElementById('sync-status').textContent = '☁';
      document.getElementById('sync-status').title = 'Synced · ' + user.email;
      hideAuthScreen();
      await loadData();
      renderAll();
    } else {
      document.getElementById('sync-status').textContent = '⚠';
      document.getElementById('sync-status').title = 'Not signed in — saving locally only';
      showAuthScreen();
    }
  });
}
init();
</script>
</body>
</html>
