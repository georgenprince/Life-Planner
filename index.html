<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2dd;
    --text: #1a1917;
    --muted: #8a8782;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent2: #c4622d;
    --accent2-light: #faeee7;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body.dark {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a32;
    --text: #e8e6e1;
    --muted: #5a5870;
    --accent: #4ade80;
    --accent-light: #0f2a1a;
    --accent2: #f97316;
    --accent2-light: #2a1500;
  }

  body, body * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease; }
  input, textarea, select { transition: none !important; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    -webkit-user-select: none;
    user-select: none;
  }

  input, textarea {
    -webkit-user-select: text;
    user-select: text;
  }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; }

  /* TOP BAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .page-title { font-size: 13px; font-weight: 600; font-family: var(--mono); }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .btn-sm {
    height: 28px; padding: 0 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-sm:hover { background: var(--bg); }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm.primary:hover { opacity: 0.9; }

  /* CONTENT */
  .content { padding: 14px 12px; display: flex; flex-direction: column; gap: 14px; }

  /* WEEK CALENDAR */
  .week-cal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .cal-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 6px;
  }
  .cal-header h2 { font-size: 16px; font-weight: 600; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-nav button {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 14px; color: var(--text);
    transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .cal-nav button:hover { background: var(--bg); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    height: 28px; padding: 0 10px;
    border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface); font-family: var(--sans);
    font-size: 11px; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .view-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* WEEK VIEW */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .week-day-header {
    padding: 8px 4px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .week-day-header:last-child { border-right: none; }
  .wdh-name { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; font-family: var(--mono); }
  .wdh-date {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 3px auto 0;
    font-size: 11px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
  }
  .wdh-date:hover { background: var(--bg); }
  .wdh-date.today { background: var(--accent); color: #fff; }
  .day-col {
    border-right: 1px solid var(--border);
    padding: 6px 4px;
    min-height: 80px;
    vertical-align: top;
    cursor: pointer;
  }
  .day-col:last-child { border-right: none; }
  .day-col:hover { background: var(--accent-light); }
  .day-bullet {
    display: flex; align-items: flex-start; gap: 3px;
    margin-bottom: 4px;
  }
  .day-bullet-dot {
    width: 5px; height: 5px; border-radius: 50%;
    margin-top: 4px; flex-shrink: 0;
  }
  .day-bullet-dot.green { background: var(--accent); }
  .day-bullet-dot.orange { background: var(--accent2); }
  .day-bullet-dot.gray { background: #bbb; }
  .day-bullet-text {
    font-size: 9px; line-height: 1.3;
    word-break: break-word; color: var(--text);
  }

  /* SPANNING EVENT BARS */
  .event-bar-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 1px 2px;
  }
  .event-bar {
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 9px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 1px 1px;
    cursor: pointer;
  }
  .event-bar.green { background: var(--accent-light); color: var(--accent); border-left: 2px solid var(--accent); }
  .event-bar.orange { background: var(--accent2-light); color: var(--accent2); border-left: 2px solid var(--accent2); }
  .event-bar.red { background: #fdecea; color: #c0392b; border-left: 2px solid #c0392b; }
  .event-bar.yellow { background: #fef9e7; color: #b7950b; border-left: 2px solid #f1c40f; }
  .event-bar.blue { background: #eaf4fb; color: #1a5276; border-left: 2px solid #2e86c1; }
  .event-bar.magenta { background: #fdf2f8; color: #76448a; border-left: 2px solid #a93226; }
  .event-bar.purple { background: #f3e8ff; color: #6b21a8; border-left: 2px solid #9333ea; }
  .event-bar.gray { background: #f0eeea; color: #555; border-left: 2px solid #bbb; }
  .event-bar.empty { background: transparent; border: none; pointer-events: none; }
  body.dark .event-bar.green { background: var(--accent-light); color: var(--accent); }
  body.dark .event-bar.orange { background: var(--accent2-light); color: var(--accent2); }
  body.dark .event-bar.red { background: rgba(192,57,43,0.2); color: #e74c3c; }
  body.dark .event-bar.yellow { background: rgba(241,196,15,0.15); color: #f1c40f; }
  body.dark .event-bar.blue { background: rgba(46,134,193,0.2); color: #5dade2; }
  body.dark .event-bar.magenta { background: rgba(169,50,38,0.2); color: #e91e8c; }
  body.dark .event-bar.purple { background: rgba(147,51,234,0.2); color: #c084fc; }
  body.dark .event-bar.gray { background: rgba(255,255,255,0.06); color: #aaa; }
  .month-grid { display: none; }
  .month-grid.visible { display: block; }
  .week-grid.hidden { display: none; }
  .month-inner {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    width: 100%;
  }
  .month-dow {
    padding: 6px 4px;
    text-align: center;
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    box-sizing: border-box;
  }
  .month-dow:last-child { border-right: none; }
  .month-cell {
    height: 72px; padding: 4px 3px 3px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    overflow: hidden;
    box-sizing: border-box;
    position: relative;
  }
  .month-cell:nth-child(7n) { border-right: none; }
  .month-cell:hover { background: var(--bg); }
  .month-cell.other-month .mday { color: #ccc; }
  .month-cell.today .mday {
    background: var(--accent); color: #fff;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .mday { font-size: 11px; font-weight: 500; margin-bottom: 2px; }

  /* MONTH WEEK ROWS */
  .month-week-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    position: relative;
  }
  .month-event-layer {
    position: absolute;
    top: 26px;
    left: 0; right: 0;
    pointer-events: none;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0;
  }
  .month-bar-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    pointer-events: all;
    height: 14px;
  }
  .month-bar {
    height: 13px;
    font-size: 8px; font-weight: 500;
    padding: 1px 4px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    cursor: pointer; border-radius: 0;
  }
  .month-bar.start { border-radius: 3px 0 0 3px; }
  .month-bar.solo { border-radius: 3px; }
  .month-bar.end { border-radius: 0 3px 3px 0; }
  .month-bar.empty { background: transparent !important; pointer-events: none; }
  .month-bar.green { background: var(--accent-light); color: var(--accent); }
  .month-bar.orange { background: var(--accent2-light); color: var(--accent2); }
  .month-bar.red { background: #fdecea; color: #c0392b; }
  .month-bar.yellow { background: #fef9e7; color: #b7950b; }
  .month-bar.blue { background: #eaf4fb; color: #1a5276; }
  .month-bar.magenta { background: #fdf2f8; color: #76448a; }
  .month-bar.purple { background: #f3e8ff; color: #6b21a8; }
  .month-bar.gray { background: #f0eeea; color: #555; }
  body.dark .month-bar.green { background: var(--accent-light); color: var(--accent); }
  body.dark .month-bar.orange { background: var(--accent2-light); color: var(--accent2); }
  body.dark .month-bar.red { background: rgba(192,57,43,0.2); color: #e74c3c; }
  body.dark .month-bar.yellow { background: rgba(241,196,15,0.15); color: #f1c40f; }
  body.dark .month-bar.blue { background: rgba(46,134,193,0.2); color: #5dade2; }
  body.dark .month-bar.magenta { background: rgba(169,50,38,0.2); color: #e91e8c; }
  body.dark .month-bar.purple { background: rgba(147,51,234,0.2); color: #c084fc; }
  body.dark .month-bar.gray { background: rgba(255,255,255,0.06); color: #aaa; }
  .m-event {
    font-size: 8px; padding: 1px 3px; border-radius: 2px;
    margin-bottom: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    display: block; min-height: 12px;
  }
  .m-event.green { background: var(--accent-light); color: var(--accent); }
  .m-event.orange { background: var(--accent2-light); color: var(--accent2); }
  .m-event.gray { background: #f0eeea; color: #555; }
  /* multi-day continuation cells — flush left/right edges */
  .month-cell:not(:nth-child(7n+1)) .m-event.multi-cont {
    border-radius: 0; margin-left: -1px; padding-left: 2px;
  }
  .month-cell:nth-child(7n) .m-event.multi-cont,
  .month-cell:nth-child(7n) .m-event.multi-start {
    border-radius: 0; margin-right: -1px;
  }
  .cal-event.green { background: var(--accent-light); color: var(--accent); border-left: 2px solid var(--accent); }
  .cal-event.orange { background: var(--accent2-light); color: var(--accent2); border-left: 2px solid var(--accent2); }
  .cal-event.gray { background: #f0eeea; color: #555; border-left: 2px solid #bbb; }
  .cal-event.red { background: #fdecea; color: #c0392b; border-left: 2px solid #c0392b; }
  .cal-event.yellow { background: #fef9e7; color: #b7950b; border-left: 2px solid #f1c40f; }
  .cal-event.blue { background: #eaf4fb; color: #1a5276; border-left: 2px solid #2e86c1; }
  .cal-event.magenta { background: #fdf2f8; color: #76448a; border-left: 2px solid #a93226; }
  .cal-event.purple { background: #f3e8ff; color: #6b21a8; border-left: 2px solid #9333ea; }
  .day-bullet-dot.purple { background: #9333ea; }
  .m-event.purple { background: #f3e8ff; color: #6b21a8; }
  .week-day-header.pto { background: #f3e8ff; }
  .month-cell.pto { background: #f3e8ff; }
  .month-cell.pto:hover { background: #ead5ff; }
  .day-col.pto { background: #f3e8ff; }
  .day-col.pto:hover { background: #ead5ff; }
  .day-bullet-dot.yellow { background: #f1c40f; }
  .day-bullet-dot.blue { background: #2e86c1; }
  .day-bullet-dot.magenta { background: #8e44ad; }
  .m-event.red { background: #fdecea; color: #c0392b; }
  .m-event.yellow { background: #fef9e7; color: #b7950b; }
  .m-event.blue { background: #eaf4fb; color: #1a5276; }
  .m-event.magenta { background: #fdf2f8; color: #76448a; }

  /* GRID SECTIONS */
  .grid-2 { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr; gap: 14px; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-head {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head h3 { font-size: 13px; font-weight: 600; }
  .card-head .add-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: all 0.15s;
  }
  .card-head .add-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .card-head .head-btns { display: flex; align-items: center; gap: 6px; }
  .card-head .edit-btn {
    height: 22px; padding: 0 8px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 10px; font-family: var(--mono);
    color: var(--muted); transition: all 0.15s;
  }
  .card-head .edit-btn:hover { background: var(--bg); color: var(--text); }
  .card-head .edit-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* DRAG REORDER */
  .drag-handle {
    cursor: grab; color: var(--muted); font-size: 14px;
    padding: 0; flex-shrink: 0; user-select: none;
    opacity: 0; width: 0; overflow: hidden; transition: opacity 0.15s, width 0.15s;
  }
  .edit-mode .drag-handle { opacity: 1; width: 18px; padding: 0 4px; }
  .drag-handle:active { cursor: grabbing; }
  .delete-btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid #e0b0b0; background: #fff5f5;
    color: #c44; font-size: 12px; line-height: 1;
    cursor: pointer; flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .edit-mode .delete-btn { display: flex; }
  .delete-btn:hover { background: #c44; color: #fff; border-color: #c44; }
  .dragging { opacity: 0.4; }
  .drag-over { border-top: 2px solid var(--accent) !important; }
  .card-body { padding: 12px 14px; }

  /* HABITS */
  .habit-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .habit-row:last-child { border-bottom: none; }
  .habit-row.duration-row { flex-wrap: wrap; }
  .habit-name { flex: 1; font-size: 14px; min-width: 0; }
  .habit-type-tag {
    font-size: 8px; font-family: var(--mono); padding: 1px 5px;
    border-radius: 8px; flex-shrink: 0;
  }
  .habit-type-tag.check { background: var(--accent-light); color: var(--accent); }
  .habit-type-tag.duration { background: #eef2ff; color: #4458c4; }
  .habit-type-tag.monthly { background: var(--accent2-light); color: var(--accent2); }
  .habit-days { display: flex; gap: 4px; }
  .hday {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--border);
    font-size: 10px; font-family: var(--mono);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); transition: all 0.15s;
    flex-shrink: 0;
  }
  .hday.done { background: var(--accent); color: #fff; border-color: var(--accent); }
  .hday.today-mark.done { color: #fff; }
  /* duration day cells */
  .hday.dur-logged { background: var(--accent); color: #fff; border-color: var(--accent); font-size: 7px; }
  .hday.dur-partial { background: #e8a92d; color: #fff; border-color: #e8a92d; font-size: 7px; }
  .hday.dur-rest { background: var(--bg); border-style: dashed; color: #ccc; }
  /* weekly progress bar */
  .habit-weekly-bar {
    width: 100%; margin-top: 4px; padding: 0 0 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .habit-weekly-track {
    flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .habit-weekly-fill {
    height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s;
  }
  .habit-weekly-fill.partial { background: #e8a92d; }
  .habit-weekly-label { font-family: var(--mono); font-size: 9px; color: var(--muted); white-space: nowrap; }
  /* monthly habit */
  .monthly-toggle {
    display: flex; align-items: center; gap: 8px; flex: 1;
  }
  .monthly-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted); transition: all 0.15s; flex-shrink: 0;
  }
  .monthly-check.done { background: var(--accent); color: #fff; border-color: var(--accent); }
  .monthly-month { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .streak { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* GOALS */
  .goal-item { padding: 9px 0; border-bottom: 1px solid var(--border); }
  .goal-item:last-child { border-bottom: none; }
  .goal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .goal-name { font-size: 13px; font-weight: 500; }
  .goal-pct { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s; }
  .progress-fill.orange { background: var(--accent2); }
  .goal-due { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  /* FINANCE */
  .finance-summary-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
  }
  .fin-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-family: var(--mono); margin-bottom: 2px; }
  .fin-val { font-size: 16px; font-weight: 600; font-family: var(--mono); }
  .fin-val.over { color: var(--accent2); }
  .budget-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .budget-row:last-child { border-bottom: none; }
  .budget-row:hover { background: var(--bg); margin: 0 -14px; padding: 8px 14px; border-radius: 6px; }
  .budget-cat { flex: 1; font-size: 13px; font-weight: 500; }
  .budget-bar-wrap { flex: 2; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .budget-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .budget-fill.ok { background: var(--accent); }
  .budget-fill.warn { background: #e8a92d; }
  .budget-fill.over { background: var(--accent2); }
  .budget-nums { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; }
  /* charge list */
  .charge-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .charge-item:last-child { border-bottom: none; }
  .charge-amount { font-family: var(--mono); font-weight: 600; font-size: 13px; flex-shrink: 0; }
  .charge-note { flex: 1; color: var(--muted); }
  .charge-date { font-family: var(--mono); font-size: 9px; color: var(--muted); flex-shrink: 0; }
  .charge-del { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; opacity: 0; transition: opacity 0.15s; padding: 0; }
  .charge-item:hover .charge-del { opacity: 1; }
  #charge-overlay { z-index: 300; }

  /* HEALTH */
  .health-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .health-stat { background: var(--bg); border-radius: 8px; padding: 10px 8px; text-align: center; }
  .hs-icon { font-size: 18px; margin-bottom: 3px; }
  .hs-val { font-size: 15px; font-weight: 600; font-family: var(--mono); }
  .hs-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--mono); }
  .week-bars { display: flex; align-items: flex-end; gap: 6px; height: 48px; }
  .week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .week-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--border); position: relative; overflow: hidden; }
  .week-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 3px 3px 0 0; background: var(--accent); transition: height 0.5s; }
  .week-bar-label { font-size: 9px; color: var(--muted); font-family: var(--mono); }

  /* CAREER / PROJECTS */
  .project-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .project-item:last-child { border-bottom: none; }
  .proj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .proj-dot.green { background: var(--accent); }
  .proj-dot.orange { background: var(--accent2); }
  .proj-dot.gray { background: #bbb; }
  .proj-info { flex: 1; }
  .proj-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .proj-sub { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .proj-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    font-family: var(--mono);
  }
  .proj-tag.active { background: var(--accent-light); color: var(--accent); }
  .proj-tag.hold { background: #f3f0ea; color: var(--muted); }
  .proj-tag.done { background: var(--accent-light); color: var(--accent); }
  .proj-tag.urgent { background: var(--accent2-light); color: var(--accent2); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); z-index: 200;
    align-items: flex-end; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 32px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: none; opacity: 1; }
  }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .form-field { margin-bottom: 14px; }
  .form-field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-family: var(--mono); }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 7px;
    font-family: var(--sans); font-size: 16px; color: var(--text);
    background: var(--bg); outline: none;
    transition: border 0.15s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .tag-label { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-family: var(--mono); margin-right: 4px; cursor: pointer; }

  /* habit rows tighter on mobile */
  .habit-name { font-size: 14px; }
  .habit-days { gap: 4px; }

  /* DARK MODE OVERRIDES */
  body.dark .hday.done { color: #0a0a0a; }
  body.dark .hday.today-mark.done { color: #0a0a0a; }
  body.dark .wdh-date.today { color: #0a0a0a; }
  body.dark .month-cell.today .mday { color: #0a0a0a; }
  body.dark .week-day-header.pto { background: rgba(147,51,234,0.18); }
  body.dark .day-col.pto { background: rgba(147,51,234,0.12); }
  body.dark .day-col.pto:hover { background: rgba(147,51,234,0.2); }
  body.dark .month-cell.pto { background: rgba(147,51,234,0.14); }
  body.dark .m-event.purple { background: rgba(147,51,234,0.2); color: #c084fc; }
  body.dark .cal-event.purple { background: rgba(147,51,234,0.2); color: #c084fc; }
  body.dark input, body.dark textarea, body.dark select { color-scheme: dark; }
  body.dark .dur-inc-btn { color: var(--text); }
  body.dark .gym-set-input { color: var(--text); }

  /* LISTS POPUP */
  .lists-trigger .card-head:hover { background: var(--bg); }
  .lists-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); z-index: 200;
    align-items: flex-end; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .lists-overlay.open { display: flex; }
  .lists-popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    width: 100%; max-width: 480px;
    max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
    animation: modalIn 0.2s ease;
  }
  .lists-popup-head {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .lists-popup-body { overflow-y: auto; padding: 8px 0 24px; }
  .list-section { border-bottom: 1px solid var(--border); }
  .list-section:last-child { border-bottom: none; }
  .list-section-head {
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: background 0.1s;
  }
  .list-section-head:hover { background: var(--bg); }
  .list-section-body { padding: 0 20px 12px; }
  .list-col-count {
    font-family: var(--mono); font-size: 9px; color: var(--muted);
    background: var(--bg); border-radius: 8px; padding: 1px 6px;
  }
  .list-col-chevron {
    font-size: 13px; color: var(--muted);
    transition: transform 0.2s; display: inline-block;
  }
  .list-col-chevron.open { transform: rotate(90deg); }
  .list-item {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 6px 0; border-bottom: 1px solid var(--border);
  }
  .list-item:last-child { border-bottom: none; }
  .list-item-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }
  .list-item-text { flex: 1; font-size: 12px; line-height: 1.4; }
  .list-item-note { font-size: 10px; color: var(--muted); font-family: var(--mono); display: block; }
  .list-item-del {
    font-size: 14px; color: var(--muted); cursor: pointer; flex-shrink: 0;
    background: none; border: none; padding: 0; line-height: 1;
    opacity: 0; transition: opacity 0.15s;
  }
  .list-item:hover .list-item-del, .list-item:active .list-item-del { opacity: 1; }
  .list-add-btn {
    margin-top: 8px; width: 100%; padding: 7px;
    border: 1px dashed var(--border); border-radius: 6px;
    background: none; font-family: var(--mono); font-size: 10px;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .list-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
#recipe-detail-overlay { z-index: 300; }
  #note-editor-overlay { z-index: 300; }
  .note-preview { font-size: 9px; color: var(--muted); font-family: var(--mono); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .recipe-title-link {
    cursor: pointer; color: var(--accent);
    text-decoration: underline; text-decoration-style: dotted;
    text-underline-offset: 2px;
  }
  /* DURATION LOG SHEET */
  .dur-sheet-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.2); z-index: 250;
    align-items: flex-end; justify-content: center;
  }
  .dur-sheet-overlay.open { display: flex; }
  .dur-sheet {
    background: var(--surface); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 480px; padding: 20px 20px 36px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
    animation: modalIn 0.2s ease;
  }
  .dur-sheet-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .dur-sheet-date { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-bottom: 14px; }
  .dur-increments { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .dur-inc-btn {
    padding: 10px 6px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg);
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text);
  }
  .dur-inc-btn:hover, .dur-inc-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dur-clear-btn {
    width: 100%; padding: 8px; border-radius: 8px;
    border: 1px dashed #ccc; background: none;
    font-family: var(--mono); font-size: 11px; color: var(--muted); cursor: pointer; margin-top: 4px;
  }
  /* habit creation form */
  .habit-type-select { display: flex; gap: 6px; margin-bottom: 2px; }
  .htype-btn {
    flex: 1; padding: 7px 4px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--bg);
    font-family: var(--sans); font-size: 11px; cursor: pointer;
    transition: all 0.15s; text-align: center; color: var(--muted);
  }
  .htype-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .inc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inc-row { display: flex; align-items: center; gap: 4px; }
  .inc-row input { width: 42px; text-align: center; }
  .inc-row span { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .goal-type-select { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .gtype-btn {
    padding: 5px 10px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--bg);
    font-family: var(--mono); font-size: 10px; cursor: pointer;
    transition: all 0.15s; color: var(--muted);
  }
  .gtype-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .day-goal-col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .day-goal-col input { width: 100%; font-size: 10px; text-align: center; padding: 3px 1px; }
  .day-goal-col .dgl { font-size: 8px; color: var(--muted); font-family: var(--mono); }
  .habit-edit-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); font-size: 12px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .edit-mode .habit-edit-btn { display: flex; }
  .habit-edit-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); } text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; color: var(--accent); }
  #habit-detail-overlay { z-index: 300; }
  .habit-cal-cell {
    aspect-ratio: 1; border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 9px; font-family: var(--mono); gap: 1px;
  }
  .habit-cal-cell.done { background: var(--accent); color: #fff; }
  .habit-cal-cell.partial { background: #e8a92d; color: #fff; }
  .habit-cal-cell.dur-detail { background: #e0deda; color: var(--text); }
  .habit-cal-cell.empty { background: var(--bg); color: var(--muted); }
  .habit-cal-cell.filler { background: transparent; color: transparent; }
  .habit-cal-dow { font-size: 8px; color: var(--muted); font-family: var(--mono); text-align: center; padding: 2px 0; }
  .habit-stat-box { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
  .habit-stat-val { font-size: 22px; font-weight: 600; font-family: var(--mono); color: var(--accent); }
  .habit-stat-label { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
  .month-summary-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px;
  }
  .month-summary-row:last-child { border-bottom: none; }
  .month-summary-val { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 500; }
  /* GYM */
  .gym-day-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .gym-day-row:last-child { border-bottom: none; }
  .gym-day-row:hover { background: var(--bg); margin: 0 -14px; padding: 8px 14px; border-radius: 6px; }
  .gym-day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .gym-day-dot.push { background: var(--accent2); }
  .gym-day-dot.pull { background: #2e86c1; }
  .gym-day-dot.legs { background: var(--accent); }
  .gym-day-name { font-size: 13px; font-weight: 500; flex: 1; }
  .gym-day-meta { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .gym-day-progress { font-size: 10px; font-family: var(--mono); color: var(--accent); }
  /* gym popup */
  .gym-overlay { z-index: 300; }
  .gym-exercise-block {
    border-bottom: 1px solid var(--border); padding: 12px 0;
  }
  .gym-exercise-block:last-child { border-bottom: none; }
  .gym-ex-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .gym-ex-name { font-size: 13px; font-weight: 600; }
  .gym-ex-target { font-size: 10px; color: var(--muted); font-family: var(--mono); }
  .gym-suggest {
    font-size: 10px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 10px; margin-bottom: 8px; display: inline-block;
  }
  .gym-suggest.progress { background: var(--accent-light); color: var(--accent); }
  .gym-suggest.hold { background: #fef9e7; color: #b7950b; }
  .gym-suggest.deload { background: var(--accent2-light); color: var(--accent2); }
  .gym-sets-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .gym-set-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .gym-set-label { font-size: 9px; color: var(--muted); font-family: var(--mono); }
  .gym-set-input {
    width: 100%; text-align: center; font-size: 14px; font-family: var(--mono);
    padding: 6px 2px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text);
  }
  .gym-set-input:focus { border-color: var(--accent); outline: none; }
  .gym-prev { font-size: 9px; color: var(--muted); font-family: var(--mono); text-align: center; }
  #arrange-overlay { z-index: 300; }
  .arrange-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
  }
  .arrange-row:last-child { border-bottom: none; }
  .arrange-handle { font-size: 16px; color: var(--muted); cursor: grab; flex-shrink: 0; }
  .arrange-name { flex: 1; font-size: 13px; font-weight: 500; }
  .arrange-name.hidden-card { color: var(--muted); text-decoration: line-through; }
  .arrange-eye {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .arrange-eye.hidden { background: var(--bg); color: #ccc; }
  .arrange-eye.visible { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .card.card-hidden { display: none; }
</style>
</head>
<body>
<div class="app">

  <div class="main">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="page-title" id="today-label"></span>
      </div>
      <div class="topbar-right">
        <span class="weather-icon" id="w-icon" style="font-size:16px"></span>
        <span class="weather-temp" id="w-temp" style="font-family:var(--mono);font-size:13px;font-weight:600"></span>
        <span id="w-desc" style="font-size:10px;color:var(--muted)"></span>
        <span style="font-size:10px;color:var(--muted);font-family:var(--mono)" id="w-hilo"></span>
        <button id="dark-toggle" onclick="toggleDarkMode()"
          style="background:none;border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--muted);font-family:var(--mono);margin-left:4px;transition:all 0.15s">
          ◑
        </button>
      </div>
    </div>

    <div class="content">

      <!-- WEEK CALENDAR -->
      <div class="week-cal" id="cal-section">
        <div class="cal-header">
          <h2 id="cal-title"></h2>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="cal-nav">
              <button onclick="navCal(-1)">‹</button>
              <button onclick="navCal(1)">›</button>
              <button onclick="goToday()" style="font-size:11px;padding:0 8px;width:auto;font-family:var(--mono)">today</button>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" id="week-view-btn" onclick="setView('week')">Week</button>
              <button class="view-btn" id="month-view-btn" onclick="setView('month')">Month</button>
            </div>
          </div>
        </div>

        <!-- WEEK VIEW -->
        <div id="week-view">
          <div class="week-grid" id="week-header-row">
            <!-- day headers injected by JS -->
          </div>
          <div style="position:relative;" id="week-body-wrapper">
            <div class="week-grid" id="week-body">
              <!-- day columns injected by JS -->
            </div>
            <div id="week-event-overlay" style="position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:2;padding:6px 0 0;display:flex;flex-direction:column;gap:2px;">
              <!-- spanning bars injected by JS -->
            </div>
          </div>
        </div>

        <!-- MONTH VIEW -->
        <div id="month-view" style="display:none; overflow:hidden;">
          <div class="month-inner" id="month-dow-row">
            <!-- DOW headers injected by JS -->
          </div>
          <div id="month-weeks-container">
            <!-- week rows injected by JS, each is position:relative -->
          </div>
        </div>
      </div>

      <!-- HABITS + GOALS -->
      <div class="grid-2" id="habits-section">

        <!-- HABITS -->
        <div class="card" data-card-id="habits">
          <div class="card-head" oncontextmenu="openArrangeCards(event)">
            <h3>Habits</h3>
            <div class="head-btns">
              <button class="edit-btn" onclick="toggleEdit('habits-list', this)">edit</button>
              <button class="add-btn" onclick="openModal('habit')">+</button>
            </div>
          </div>
          <div class="card-body" id="habits-list"></div>
        </div>

<!-- HABIT DETAIL POPUP -->
<div class="lists-overlay" id="habit-detail-overlay" onclick="closeHabitDetail(event)">
  <div class="lists-popup" onclick="event.stopPropagation()" style="max-height:90vh;">
    <div class="lists-popup-head">
      <div>
        <div id="habit-detail-title" style="font-size:14px;font-weight:600"></div>
        <div id="habit-detail-month" style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px"></div>
      </div>
      <button onclick="closeHabitDetail()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;line-height:1">×</button>
    </div>
    <div class="lists-popup-body" style="padding:12px 16px 32px">
      <div id="habit-detail-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px"></div>
      <div id="habit-detail-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
    </div>
  </div>
</div>

<!-- DURATION LOG SHEET -->
<div class="dur-sheet-overlay" id="dur-sheet-overlay" onclick="closeDurSheet(event)">
  <div class="dur-sheet" onclick="event.stopPropagation()">
    <div class="dur-sheet-title" id="dur-sheet-title"></div>
    <div class="dur-sheet-date" id="dur-sheet-date"></div>
    <div class="dur-increments" id="dur-increments"></div>
    <button class="dur-clear-btn" onclick="logDuration(null)">Clear / rest day</button>
  </div>
</div>

        <!-- GOALS -->

<script>
// ──────────────────────────────────────────────
// HELPERS (must be defined before state)
// ──────────────────────────────────────────────
function dateStr(d) { return d.toISOString().slice(0,10); }
function offsetDay(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate()-x.getDay()); return x; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
const state = {
  today: new Date(),
  calView: 'week',
  weekOffset: 0,
  monthOffset: 0,
  events: [
    { id: 1, title: 'Team Standup', date: dateStr(new Date()), color: 'green' },
    { id: 2, title: 'Gym — Legs', date: dateStr(offsetDay(new Date(), 1)), color: 'orange' },
    { id: 3, title: 'Site Visit', date: dateStr(offsetDay(new Date(), 2)), color: 'green' },
  ],
  habits: [
    { id: 1, name: 'Morning Run', completions: {}, streak: 0 },
    { id: 2, name: 'Read 20 min', completions: {}, streak: 0 },
    { id: 3, name: 'No social media AM', completions: {}, streak: 0 },
    { id: 4, name: 'Drink 3L water', completions: {}, streak: 0 },
  ],
  goals: [
    { id: 1, name: 'PE License Exam', pct: 65, due: 'Aug 2026', color: '' },
    { id: 2, name: 'Save $10k emergency fund', pct: 42, due: 'Dec 2026', color: 'orange' },
    { id: 3, name: 'Complete bridge project', pct: 80, due: 'Jul 2026', color: '' },
    { id: 4, name: 'Run a half marathon', pct: 30, due: 'Nov 2026', color: 'orange' },
  ],
  budget: {
    categories: [
      { id: 1, name: 'Eating Out', limit: 200, charges: [] },
      { id: 2, name: 'Entertainment', limit: 150, charges: [] },
      { id: 3, name: 'Groceries', limit: 400, charges: [] },
    ]
  },
  health: {
    steps: 8340, sleep: 7.2, weight: 172, workouts: 4,
    weekSteps: [6200, 9100, 7400, 8800, 5500, 10200, 8340]
  },
  modalType: null,
};

// ──────────────────────────────────────────────
// CALENDAR
// ──────────────────────────────────────────────
function eventSpansDate(e, d) {
  const ds = dateStr(d);
  const end = e.endDate || e.date;
  return ds >= e.date && ds <= end;
}

function getWeekDays() {
  const base = startOfWeek(state.today);
  const shifted = new Date(base.getTime() + state.weekOffset * 7 * 24 * 60 * 60 * 1000);
  return Array.from({length:7}, (_,i) => new Date(shifted.getTime() + i * 24 * 60 * 60 * 1000));
}
function getMonthBase() {
  const d = new Date(state.today.getFullYear(), state.today.getMonth() + state.monthOffset, 1);
  return d;
}

function renderWeek() {
  const days = getWeekDays();
  const title = `${MONTHS[days[0].getMonth()]} ${days[0].getDate()} – ${MONTHS[days[6].getMonth()]} ${days[6].getDate()}, ${days[6].getFullYear()}`;
  document.getElementById('cal-title').textContent = title;

  // headers
  const headerRow = document.getElementById('week-header-row');
  headerRow.innerHTML = '';
  days.forEach(d => {
    const isToday = sameDay(d, state.today);
    const hasPTO = state.events.some(e => eventSpansDate(e, d) && e.color === 'purple');
    const div = document.createElement('div');
    div.className = 'week-day-header' + (hasPTO ? ' pto' : '');
    div.innerHTML = `<div class="wdh-name">${DAYS[d.getDay()]}</div>
      <div class="wdh-date${isToday?' today':''}">${d.getDate()}</div>`;
    headerRow.appendChild(div);
  });

  // separate multi-day vs single-day
  const weekStartStr = dateStr(days[0]);
  const weekEndStr = dateStr(days[6]);
  const spannedEvents = state.events.filter(e => {
    const end = e.endDate || e.date;
    return end > e.date && days.some(d => eventSpansDate(e, d));
  });

  // day columns — only single-day events as bullets
  const body = document.getElementById('week-body');
  body.innerHTML = '';
  days.forEach(d => {
    const col = document.createElement('div');
    const allDayEvents = state.events.filter(e => eventSpansDate(e, d));
    const singleDayEvents = allDayEvents.filter(e => !e.endDate || e.endDate === e.date);
    const hasPTO = allDayEvents.some(e => e.color === 'purple');
    col.className = 'day-col' + (hasPTO ? ' pto' : '');
    col.onclick = () => openModalWithDate('event', dateStr(d));
    // add top padding so bullets don't hide under bars
    if (spannedEvents.length > 0) col.style.paddingTop = (6 + spannedEvents.length * 16) + 'px';
    singleDayEvents.forEach(e => {
      const bullet = document.createElement('div');
      bullet.className = 'day-bullet';
      bullet.innerHTML = `<div class="day-bullet-dot ${e.color}"></div><div class="day-bullet-text">${e.title}</div>`;
      bullet.onclick = evt => { evt.stopPropagation(); openEventEdit(e.id); };
      col.appendChild(bullet);
    });
    body.appendChild(col);
  });

  // overlay bars on top of day columns
  const overlay = document.getElementById('week-event-overlay');
  overlay.innerHTML = '';
  overlay.style.pointerEvents = 'none';

  if (spannedEvents.length > 0) {
    // pack into rows
    const rows = [];
    spannedEvents.forEach(e => {
      const s = Math.max(0, days.findIndex(d => dateStr(d) >= e.date));
      const en = days.reduce((last, d, i) => dateStr(d) <= (e.endDate||e.date) ? i : last, -1);
      if (en < 0) return;
      let placed = false;
      for (const row of rows) {
        if (!row.some(item => !(item.en < s || item.s > en))) {
          row.push({ e, s, en }); placed = true; break;
        }
      }
      if (!placed) rows.push([{ e, s, en }]);
    });

    rows.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'month-bar-row'; // reuse same grid style
      rowEl.style.pointerEvents = 'all';
      const slots = Array(7).fill(null);
      row.forEach(({ e, s, en }) => {
        for (let i = s; i <= en; i++) slots[i] = { e, s, en };
      });
      let i = 0;
      while (i < 7) {
        const slot = slots[i];
        if (!slot) {
          const empty = document.createElement('div');
          empty.className = 'month-bar empty';
          rowEl.appendChild(empty);
          i++;
        } else {
          const span = slot.en - slot.s + 1;
          const isStart = slot.s === i;
          const isSolo = slot.e.date >= weekStartStr && (slot.e.endDate||slot.e.date) <= weekEndStr && slot.e.date === (slot.e.endDate||slot.e.date);
          const bar = document.createElement('div');
          bar.className = `month-bar ${slot.e.color}${isSolo?' solo':isStart?' start':''}`;
          if (!isSolo && slot.en === i + span - 1) bar.className += ' end';
          bar.style.gridColumn = `${i+1} / span ${span}`;
          bar.textContent = isStart ? slot.e.title : '';
          bar.onclick = evt => { evt.stopPropagation(); openEventEdit(slot.e.id); };
          rowEl.appendChild(bar);
          i += span;
        }
      }
      overlay.appendChild(rowEl);
    });
  }
}

function renderMonth() {
  const base = getMonthBase();
  document.getElementById('cal-title').textContent = `${MONTHS[base.getMonth()]} ${base.getFullYear()}`;

  // DOW headers
  const dowRow = document.getElementById('month-dow-row');
  dowRow.innerHTML = DAYS.map(d => `<div class="month-dow">${d[0]}</div>`).join('');

  // build flat list of all cells for this month view
  const firstDay = base.getDay();
  const daysInMonth = new Date(base.getFullYear(), base.getMonth()+1, 0).getDate();
  const prevDays = new Date(base.getFullYear(), base.getMonth(), 0).getDate();
  const cells = [];
  for (let i = firstDay-1; i >= 0; i--)
    cells.push({ d: new Date(base.getFullYear(), base.getMonth()-1, prevDays-i), other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ d: new Date(base.getFullYear(), base.getMonth(), d), other: false });
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++)
    cells.push({ d: new Date(base.getFullYear(), base.getMonth()+1, i), other: true });

  // split into weeks
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

  const container = document.getElementById('month-weeks-container');
  container.innerHTML = '';

  weeks.forEach(week => {
    const weekRow = document.createElement('div');
    weekRow.className = 'month-week-row';

    // day cells (date numbers + click handler only, no events inline)
    week.forEach(({ d, other }) => {
      const hasPTO = state.events.some(e => eventSpansDate(e, d) && e.color === 'purple');
      const cell = document.createElement('div');
      cell.className = `month-cell${other?' other-month':''}${sameDay(d,state.today)?' today':''}${hasPTO?' pto':''}`;
      cell.onclick = () => openModalWithDate('event', dateStr(d));
      const dayDiv = document.createElement('div');
      dayDiv.className = 'mday';
      dayDiv.textContent = d.getDate();
      cell.appendChild(dayDiv);
      weekRow.appendChild(cell);
    });

    // event overlay layer
    const weekStart = week[0].d;
    const weekEnd = week[6].d;
    const weekStartStr = dateStr(weekStart);
    const weekEndStr = dateStr(weekEnd);

    // find all events visible in this week
    const visibleEvents = state.events.filter(e => {
      const end = e.endDate || e.date;
      return e.date <= weekEndStr && end >= weekStartStr;
    });

    if (visibleEvents.length > 0) {
      // pack events into rows (no overlap)
      const rows = [];
      visibleEvents.forEach(e => {
        const end = e.endDate || e.date;
        const s = Math.max(0, week.findIndex(c => dateStr(c.d) >= e.date));
        const en = week.reduce((last, c, i) => dateStr(c.d) <= end ? i : last, -1);
        if (en < 0) return;
        let placed = false;
        for (const row of rows) {
          if (!row.some(item => !(item.en < s || item.s > en))) {
            row.push({ e, s, en }); placed = true; break;
          }
        }
        if (!placed) rows.push([{ e, s, en }]);
      });

      const layer = document.createElement('div');
      layer.className = 'month-event-layer';

      rows.forEach(row => {
        const barRow = document.createElement('div');
        barRow.className = 'month-bar-row';
        const slots = Array(7).fill(null);
        row.forEach(({ e, s, en }) => {
          for (let i = s; i <= en; i++) slots[i] = { e, s, en };
        });

        let i = 0;
        while (i < 7) {
          const slot = slots[i];
          if (!slot) {
            const empty = document.createElement('div');
            empty.className = 'month-bar empty';
            barRow.appendChild(empty);
            i++;
          } else {
            const span = slot.en - slot.s + 1;
            const isStart = slot.s === i;
            const isEnd = slot.en === i + span - 1;
            const bar = document.createElement('div');
            const end = slot.e.endDate || slot.e.date;
            const isSolo = slot.e.date >= weekStartStr && end <= weekEndStr && slot.e.date === end;
            bar.className = `month-bar ${slot.e.color}${isSolo?' solo':isStart?' start':''} `;
            if (!isSolo && isEnd) bar.className += ' end';
            bar.style.gridColumn = `${i+1} / span ${span}`;
            bar.textContent = isStart ? slot.e.title : '';
            bar.onclick = evt => { evt.stopPropagation(); openEventEdit(slot.e.id); };
            barRow.appendChild(bar);
            i += span;
          }
        }
        layer.appendChild(barRow);
      });

      weekRow.appendChild(layer);
    }

    container.appendChild(weekRow);
  });
}

function setupDrag(container, arr, renderFn) {
  setupTouchReorder(container, arr, renderFn);
}
function setupDragByIndex(container, arr, renderFn) {
  setupTouchReorder(container, arr, renderFn);
}

function setupTouchReorder(container, arr, renderFn) {
  // Remove any previous listeners by cloning the container's handle elements
  // We attach per-handle listeners directly, so we query fresh each call
  const handles = container.querySelectorAll('.drag-handle');
  handles.forEach((handle, _) => {
    // Clone to strip old listeners
    const fresh = handle.cloneNode(true);
    handle.parentNode.replaceChild(fresh, handle);
  });

  let srcIdx = null;

  container.querySelectorAll('.drag-handle').forEach(handle => {
    let longPress = null;

    const getRows = () => [...container.querySelectorAll('[draggable="true"]')];

    const startDrag = (e) => {
      e.preventDefault();
      const row = handle.closest('[draggable="true"]');
      if (!row) return;
      srcIdx = getRows().indexOf(row);
      row.style.opacity = '0.4';
      row.style.outline = '2px solid var(--accent)';
      row.style.borderRadius = '6px';

      // highlight all other rows as drop targets
      getRows().forEach((r, i) => {
        if (i === srcIdx) return;
        r.style.cursor = 'pointer';
        r.addEventListener('click', onDropTarget);
        r.addEventListener('touchend', onDropTarget);
      });
    };

    const onDropTarget = function(e) {
      e.stopPropagation();
      const rows = getRows();
      const destIdx = rows.indexOf(this);
      if (srcIdx === null || destIdx === srcIdx) return cleanup();

      // swap in array
      const [moved] = arr.splice(srcIdx, 1);
      arr.splice(destIdx, 0, moved);
      cleanup();
      renderFn();
      saveData();
      setTimeout(() => {
        document.querySelectorAll('.edit-btn.active').forEach(btn => {
          const m = btn.getAttribute('onclick').match(/'([^']+)'/);
          if (m) { const el = document.getElementById(m[1]); if (el) el.classList.add('edit-mode'); }
        });
      }, 0);
    };

    const cleanup = () => {
      srcIdx = null;
      getRows().forEach(r => {
        r.style.opacity = '';
        r.style.outline = '';
        r.style.borderRadius = '';
        r.style.cursor = '';
        r.removeEventListener('click', onDropTarget);
        r.removeEventListener('touchend', onDropTarget);
      });
    };

    // long press to enter drag mode
    handle.addEventListener('touchstart', (e) => {
      longPress = setTimeout(() => startDrag(e), 300);
    }, { passive: true });
    handle.addEventListener('touchend', () => clearTimeout(longPress));
    handle.addEventListener('touchmove', () => clearTimeout(longPress), { passive: true });
    handle.addEventListener('mousedown', (e) => startDrag(e));
  });
}

function deleteItem(arr, id, renderFn) {
  const idx = arr.findIndex(x => x.id === id);
  if (idx !== -1) arr.splice(idx, 1);
  renderFn();
  saveData();
  // re-apply edit mode to re-rendered list
  setTimeout(() => {
    document.querySelectorAll('.edit-btn.active').forEach(btn => {
      const listId = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
      const el = document.getElementById(listId);
      if (el) el.classList.add('edit-mode');
    });
  }, 0);
}

function fmtMins(mins) {
  if (!mins) return '0m';
  const h = Math.floor(mins/60), m = mins%60;
  return h && m ? `${h}h${m}m` : h ? `${h}h` : `${m}m`;
}

function getDayGoalMins(h, dow) {
  if (!h.goalType || h.goalType==='none') return null;
  if (h.goalType==='daily') return h.goalMins||0;
  if (h.goalType==='dayspec') return (h.dayGoals||[])[dow]??0;
  return null; // weekly handled separately
}

function getWeekGoalMins(h) {
  if (h.goalType==='weekly') return h.goalMins||0;
  return null;
}

function getWeekTotalMins(h, weekDays) {
  return weekDays.reduce((sum, d) => sum + (parseInt(h.completions[dateStr(d)])||0), 0);
}

function calcStreak(h) {
  if (!h.completions) return 0;
  if (h.type === 'monthly') {
    // count consecutive months
    let streak = 0;
    const d = new Date(state.today.getFullYear(), state.today.getMonth(), 1);
    while(true) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (h.completions[key]) { streak++; d.setMonth(d.getMonth()-1); }
      else break;
    }
    return streak;
  }
  if (h.type === 'duration' && h.goalType === 'weekly') {
    // streak = consecutive weeks where weekly goal met
    let streak = 0;
    let weekStart = startOfWeek(state.today);
    for (let w=0; w<52; w++) {
      const days = Array.from({length:7},(_,i)=>offsetDay(weekStart,i-7*w));
      const total = days.reduce((s,d)=>s+(parseInt(h.completions[dateStr(d)])||0),0);
      if (total >= (h.goalMins||0)) streak++;
      else break;
    }
    return streak;
  }
  // daily streak
  let streak = 0;
  const d = new Date(state.today);
  while(true) {
    const ds = dateStr(d);
    const dow = d.getDay();
    if (h.type==='duration') {
      const dayGoal = h.goalType==='dayspec' ? ((h.dayGoals||[])[dow]??0) : (h.goalType==='daily'?h.goalMins:0);
      const logged = parseInt(h.completions[ds])||0;
      if (dayGoal===0) { d.setDate(d.getDate()-1); continue; } // rest day, skip
      if (logged > 0) { streak++; d.setDate(d.getDate()-1); } else break;
    } else {
      if (h.completions[ds]) { streak++; d.setDate(d.getDate()-1); } else break;
    }
    if (streak > 365) break;
  }
  return streak;
}

function renderHabits() {
  const el = document.getElementById('habits-list');
  const wasEdit = el.classList.contains('edit-mode');
  const weekDays = getWeekDays();
  const isMonthView = state.calView === 'month';

  el.innerHTML = state.habits.map(h => {
    const type = h.type || 'check';
    const typeTag = `<span class="habit-type-tag ${type}">${type==='check'?'✓':type==='duration'?'⏱':'📅'}</span>`;
    const nameEl = isMonthView
      ? `<span class="habit-name habit-name-link" onclick="openHabitDetail(${h.id})">${h.name}</span>`
      : `<span class="habit-name">${h.name}</span>`;

    if (type === 'monthly') {
      const base = getMonthBase();
      const key = `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}`;
      const done = h.completions[key];
      const monthLabel = `${MONTHS[base.getMonth()].slice(0,3)} ${base.getFullYear()}`;
      return `<div class="habit-row" draggable="true" data-id="${h.id}">
        <span class="drag-handle">⠿</span>
        ${typeTag}
        ${nameEl}
        <button class="habit-edit-btn" onclick="openHabitEditModal(${h.id})">✎</button>
        <div class="monthly-toggle">
          <div class="monthly-check${done?' done':''}" onclick="toggleMonthlyHabit(${h.id},'${key}')">
            ${done?'✓':''}
          </div>
          <span class="monthly-month">${monthLabel}</span>
        </div>
        <button class="delete-btn" onclick="deleteItem(state.habits,${h.id},renderHabits)">×</button>
      </div>`;
    }

    if (type === 'duration') {
      const weeklyGoal = getWeekGoalMins(h);
      const weekTotal = getWeekTotalMins(h, weekDays);
      const days = weekDays.map(d => {
        const ds = dateStr(d);
        const logged = parseInt(h.completions[ds])||0;
        const dow = d.getDay();
        const dayGoal = getDayGoalMins(h, dow);
        let cls = '', label = '';
        if (logged > 0) {
          label = fmtMins(logged);
          cls = (dayGoal !== null) ? (logged >= dayGoal ? 'dur-logged' : 'dur-partial') : 'dur-logged';
        } else if (dayGoal === 0) {
          cls = 'dur-rest'; label = 'SMTWTFS'[d.getDay()];
        } else {
          label = 'SMTWTFS'[d.getDay()];
        }
        return `<div class="hday ${cls}" onclick="openDurSheet(${h.id},'${ds}')" style="font-size:7px">${label}</div>`;
      }).join('');

      let weekBar = '';
      if (weeklyGoal) {
        const pct = Math.min(100, Math.round(weekTotal/weeklyGoal*100));
        const cls = weekTotal >= weeklyGoal ? '' : 'partial';
        weekBar = `<div class="habit-weekly-bar" style="width:100%">
          <div class="habit-weekly-track"><div class="habit-weekly-fill ${cls}" style="width:${pct}%"></div></div>
          <span class="habit-weekly-label">${fmtMins(weekTotal)}/${fmtMins(weeklyGoal)}</span>
        </div>`;
      }

      return `<div class="habit-row duration-row" draggable="true" data-id="${h.id}">
        <span class="drag-handle">⠿</span>
        ${typeTag}
        ${nameEl}
        <button class="habit-edit-btn" onclick="openHabitEditModal(${h.id})">✎</button>
        <div class="habit-days">${days}</div>
        <button class="delete-btn" onclick="deleteItem(state.habits,${h.id},renderHabits)">×</button>
        ${weekBar}
      </div>`;
    }

    // check habit
    const days = weekDays.map(d => {
      const ds = dateStr(d);
      const done = h.completions && h.completions[ds];
      return `<div class="hday${done?' done':''}" onclick="toggleHabit(${h.id},'${ds}')">${'SMTWTFS'[d.getDay()]}</div>`;
    }).join('');

    return `<div class="habit-row" draggable="true" data-id="${h.id}">
      <span class="drag-handle">⠿</span>
      ${typeTag}
      ${nameEl}
      <button class="habit-edit-btn" onclick="openHabitEditModal(${h.id})">✎</button>
      <div class="habit-days">${days}</div>
      <button class="delete-btn" onclick="deleteItem(state.habits,${h.id},renderHabits)">×</button>
    </div>`;
  }).join('');

  // month view: duration summaries
  if (isMonthView) {
    const base = getMonthBase();
    const durationHabits = state.habits.filter(h=>h.type==='duration');
    if (durationHabits.length > 0) {
      const summary = document.createElement('div');
      summary.style = 'border-top:1px solid var(--border);margin-top:10px;padding-top:8px';
      summary.innerHTML = `<div style="font-size:9px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${MONTHS[base.getMonth()]} summary</div>` +
        durationHabits.map(h => {
          const total = Object.entries(h.completions).filter(([ds]) => ds.startsWith(`${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}`)).reduce((s,[,v])=>s+(parseInt(v)||0),0);
          return `<div class="month-summary-row"><span>${h.name}</span><span class="month-summary-val">${fmtMins(total)}</span></div>`;
        }).join('');
      el.appendChild(summary);
    }
  }

  if (wasEdit) el.classList.add('edit-mode');
  setupDrag(el, state.habits, renderHabits);
}

function openHabitDetail(id) {
  const h = state.habits.find(x => x.id === id);
  if (!h) return;
  const base = getMonthBase();
  const yr = base.getFullYear();
  const mo = base.getMonth();
  const monthKey = `${yr}-${String(mo+1).padStart(2,'0')}`;
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const firstDow = new Date(yr, mo, 1).getDay();
  const type = h.type || 'check';

  document.getElementById('habit-detail-title').textContent = h.name;
  document.getElementById('habit-detail-month').textContent = `${MONTHS[mo]} ${yr}`;

  // build calendar grid
  const grid = document.getElementById('habit-detail-grid');
  grid.innerHTML = '';
  // DOW headers
  ['S','M','T','W','T','F','S'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'habit-cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  // filler cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'habit-cal-cell filler';
    grid.appendChild(el);
  }
  // day cells
  let completedDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const val = h.completions[ds];
    const el = document.createElement('div');
    let cls = 'empty', sublabel = '';
    if (type === 'duration') {
      const logged = parseInt(val)||0;
      const dow = new Date(yr, mo, d).getDay();
      const dayGoal = getDayGoalMins(h, dow);
      if (logged > 0) {
        cls = 'dur-detail'; // always grey for duration in detail view
        sublabel = fmtMins(logged);
        completedDays++;
      } else if (dayGoal === 0) {
        cls = 'filler';
      }
    } else {
      if (val) { cls = 'done'; completedDays++; }
      // check habits: tap to toggle
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => {
        if (!h.completions) h.completions = {};
        h.completions[ds] = h.completions[ds] ? 0 : 1;
        saveData();
        renderHabits();
        openHabitDetail(id); // re-render popup
      });
    }
    el.className = `habit-cal-cell ${cls}`;
    el.innerHTML = `<span>${d}</span>${sublabel ? `<span style="font-size:7px">${sublabel}</span>` : ''}`;
    grid.appendChild(el);
  }

  // stats
  const streak = calcStreak(h);
  // longest streak in this month
  let longestStreak = 0, cur = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const val = h.completions[ds];
    const active = type === 'duration' ? (parseInt(val)||0) > 0 : !!val;
    if (active) { cur++; longestStreak = Math.max(longestStreak, cur); }
    else cur = 0;
  }

  const statsEl = document.getElementById('habit-detail-stats');
  const streakUnit = h.type === 'monthly' ? 'mo' : 'd';
  statsEl.innerHTML = `
    <div class="habit-stat-box">
      <div class="habit-stat-val">${completedDays}</div>
      <div class="habit-stat-label">Days this month</div>
    </div>
    <div class="habit-stat-box">
      <div class="habit-stat-val">${longestStreak}${streakUnit}</div>
      <div class="habit-stat-label">Longest streak</div>
    </div>
    <div class="habit-stat-box" style="grid-column:span 2">
      <div class="habit-stat-val">${streak}${streakUnit}</div>
      <div class="habit-stat-label">Current streak (all time)</div>
    </div>
  `;

  document.getElementById('habit-detail-overlay').classList.add('open');
}

  document.getElementById('habit-detail-overlay').classList.remove('open');
}


let durCtx = { habitId: null, ds: null };

  durCtx = { habitId, ds };
  const current = parseInt(h.completions[ds])||0;
  document.getElementById('dur-sheet-title').textContent = h.name;
  document.getElementById('dur-sheet-date').textContent = ds;
  const incs = h.increments||[];
  document.getElementById('dur-increments').innerHTML = incs.map(mins =>
    `<button class="dur-inc-btn${current===mins?' selected':''}" onclick="logDuration(${mins})">${fmtMins(mins)}</button>`
  ).join('');
  document.getElementById('dur-sheet-overlay').classList.add('open');
}

function logDuration(mins) {
  const h = state.habits.find(x=>x.id===durCtx.habitId);
  if (!h) return;
  if (!h.completions) h.completions = {};
  if (mins === null) delete h.completions[durCtx.ds];
  else h.completions[durCtx.ds] = mins;
  renderHabits(); saveData();
  document.getElementById('dur-sheet-overlay').classList.remove('open');
}

function getMonthKey() {
  const b = new Date(state.today.getFullYear(), state.today.getMonth(), 1);
  return `${b.getFullYear()}-${String(b.getMonth()+1).padStart(2,'0')}`;
}

function getCatMonthTotal(cat) {
  const mk = getMonthKey();
  return (cat.charges||[]).filter(c=>c.date.startsWith(mk)).reduce((s,c)=>s+c.amount,0);
}

function renderFinance() {
  const cats = state.budget.categories;
  const totalSpent = cats.reduce((s,c)=>s+getCatMonthTotal(c),0);
  const totalLimit = cats.reduce((s,c)=>s+(c.limit||0),0);
  const pctTotal = totalLimit ? Math.min(100,Math.round(totalSpent/totalLimit*100)) : 0;
  const clsTotal = pctTotal>=100?'over':'';

  document.getElementById('finance-summary').innerHTML = `
    <div class="finance-summary-bar">
      <div><div class="fin-label">${MONTHS[new Date().getMonth()]} spent</div><div class="fin-val ${clsTotal}">$${totalSpent.toFixed(2)}</div></div>
      <div style="text-align:right"><div class="fin-label">of $${totalLimit} budgeted</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${pctTotal}%</div>
      </div>
    </div>`;

  const budgetEl = document.getElementById('budget-rows');
  const wasEdit = budgetEl.classList.contains('edit-mode');
  budgetEl.innerHTML = cats.map((c,i)=>{
    const spent = getCatMonthTotal(c);
    const pct = c.limit ? Math.min(100,Math.round(spent/c.limit*100)) : 0;
    const cls = pct>=100?'over':pct>=85?'warn':'ok';
    return `<div class="budget-row" draggable="true" data-idx="${i}" onclick="openChargePopup(${i})">
      <span class="drag-handle">⠿</span>
      <span class="budget-cat">${c.name}</span>
      <div class="budget-bar-wrap"><div class="budget-fill ${cls}" style="width:${pct}%"></div></div>
      <span class="budget-nums">$${spent.toFixed(0)}${c.limit?'/$'+c.limit:''}</span>
      <button class="delete-btn" onclick="event.stopPropagation();deleteBudgetCat(${i})">×</button>
    </div>`;
  }).join('');
  if (wasEdit) budgetEl.classList.add('edit-mode');
  setupDragByIndex(budgetEl, cats, renderFinance);
}

function deleteBudgetCat(idx) {
  state.budget.categories.splice(idx, 1);
  renderFinance();
  saveData();
  setTimeout(() => {
    document.querySelectorAll('.edit-btn.active').forEach(btn => {
      const m = btn.getAttribute('onclick').match(/'([^']+)'/);
      if (m) { const el = document.getElementById(m[1]); if (el) el.classList.add('edit-mode'); }
    });
  }, 0);
}

let currentCatIdx = null;

function openChargePopup(idx) {
  currentCatIdx = idx;

  const spent = getCatMonthTotal(cat);
  document.getElementById('charge-cat-title').value = cat.name;

  document.getElementById('charge-note').value = '';
  document.getElementById('charge-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('charge-amount').focus(), 100);
}

function renameCat(newName) {
  const name = newName.trim();
  if (!name || currentCatIdx === null) return;
  state.budget.categories[currentCatIdx].name = name;
  renderFinance();
  saveData();
}

function renderChargeList(cat, mk) {
  const charges = (cat.charges||[]).filter(c=>c.date.startsWith(mk)).slice().reverse();
  document.getElementById('charge-list').innerHTML = charges.length ? charges.map((c,i)=>`
    <div class="charge-item">
      <span class="charge-amount">$${c.amount.toFixed(2)}</span>
      <span class="charge-note">${c.note||''}</span>
      <span class="charge-date">${c.date.slice(5)}</span>
      <button class="charge-del" onclick="deleteCharge(${cat.charges.indexOf(c)})">×</button>
    </div>`).join('') :
    `<div style="font-size:12px;color:var(--muted);padding:12px 0">No charges this month yet.</div>`;
}

function addCharge() {
  const amt = parseFloat(document.getElementById('charge-amount').value);
  if (!amt || amt <= 0) return;
  const note = document.getElementById('charge-note').value;
  const cat = state.budget.categories[currentCatIdx];
  if (!cat.charges) cat.charges = [];
  cat.charges.push({ amount: amt, note, date: dateStr(state.today) });
  const mk = getMonthKey();
  const spent = getCatMonthTotal(cat);
  document.getElementById('charge-cat-summary').textContent =
    `$${spent.toFixed(2)} spent this month${cat.limit?' · $'+cat.limit+' limit':''}`;
  renderChargeList(cat, mk);
  renderFinance();
  saveData();
  document.getElementById('charge-amount').value = '';
  document.getElementById('charge-note').value = '';
  document.getElementById('charge-amount').focus();
}

function deleteCharge(chargeIdx) {
  const cat = state.budget.categories[currentCatIdx];
  cat.charges.splice(chargeIdx, 1);
  const mk = getMonthKey();
  renderChargeList(cat, mk);
  renderFinance();
  saveData();
}

  if (e && e.target !== document.getElementById('charge-overlay')) return;
  document.getElementById('charge-overlay').classList.remove('open');

}

function saveModal() {
  const t = state.modalType;
  const g = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  if (t==='event-edit') {
    const e = state.events.find(x => x.id === state.editingEventId);
    if (e) {
      e.title = g('f-title') || e.title;
      e.date = g('f-date') || e.date;
      e.endDate = g('f-enddate') || e.date;
      if (e.endDate < e.date) e.endDate = e.date;
      e.color = g('f-color') || e.color;
      renderCal();
      saveData();
    }
    closeModal();
    return;
  }
  if (t==='habit-edit') {
    saveHabitEdit();
    closeModal();
    return;
  }
  if (t==='event') {
    const title = g('f-title');
    if (!title) return;
    const startDate = g('f-date');
    const endDate = g('f-enddate') || startDate;
    state.events.push({ id: Date.now(), title, date: startDate, endDate: endDate >= startDate ? endDate : startDate, color: g('f-color')||'green' });
    renderCal();
  } else if (t==='habit') {
    const name = g('f-title'); if (!name) return;
    const htype = document.querySelector('.htype-btn.active')?.id?.replace('ht-','') || 'check';
    const habit = { id: Date.now(), name, type: htype, completions: {} };
    if (htype === 'duration') {
      habit.increments = [1,2,3,4,5].map(n => {
        const h = parseInt(g(`f-ih${n}`))||0;
        const m = parseInt(g(`f-im${n}`))||0;
        return h*60+m;
      }).filter(v=>v>0);
      const gtype = document.querySelector('.gtype-btn.active')?.id?.replace('gt-','') || 'none';
      habit.goalType = gtype;
      if (gtype==='daily') {
        habit.goalMins = (parseInt(g('f-gh'))||0)*60 + (parseInt(g('f-gm'))||0);
      } else if (gtype==='weekly') {
        habit.goalMins = (parseInt(g('f-gwh'))||0)*60 + (parseInt(g('f-gwm'))||0);
      } else if (gtype==='dayspec') {
        habit.dayGoals = [0,1,2,3,4,5,6].map(i =>
          (parseInt(g(`f-gdh${i}`))||0)*60 + (parseInt(g(`f-gdm${i}`))||0)
        );
      }
    }
    state.habits.push(habit);
    renderHabits();
  } else if (t==='goal') {
    const name = g('f-title'); if (!name) return;
    state.goals.push({ id: Date.now(), name, pct: parseInt(g('f-pct'))||0, due: g('f-due')||'TBD', color: '' });
    renderGoals();
  } else if (t==='budget') {
    const name = g('f-title'); if (!name) return;
    const limit = parseFloat(g('f-budget'))||0;
    state.budget.categories.push({ id: Date.now(), name, limit, charges: [] });
    renderFinance();
  } else if (t==='health') {
    state.health.steps = parseInt(g('f-steps'))||state.health.steps;
    state.health.sleep = parseFloat(g('f-sleep'))||state.health.sleep;
    state.health.weight = parseFloat(g('f-weight'))||state.health.weight;
    state.health.workouts = parseInt(g('f-workouts'))||state.health.workouts;
    state.health.weekSteps[state.today.getDay()] = state.health.steps;
    renderHealth();
  } else if (t.startsWith('list-')) {
    const key = t.replace('list-', '');
    const title = g('f-title'); if (!title) return;
    const item = { title, note: g('f-note') };
    if (key === 'recipes' || key === 'notes') item.description = g('f-desc');
    state.lists[key].push(item);
    renderList(key);
  }
  saveData();
  closeModal();
}

  document.getElementById('modal-overlay').classList.remove('open');

  const items = state.lists[key];
  document.getElementById('list-count-' + key).textContent = items.length;
  document.getElementById('list-items-' + key).innerHTML = items.map((item, i) => {
    const isNote = key === 'notes';

      ? `event.stopPropagation();openNoteEditor(${i})`
      : `event.stopPropagation();openRecipeDetail('${key}',${i})`;
    const preview = isNote && item.description
      ? `<span class="note-preview">${item.description.split('\n')[0]}</span>` : '';
    return `
    <div class="list-item"${clickable ? ` onclick="${clickFn}" style="cursor:pointer"` : ''}>
      <div class="list-item-dot"></div>
      <div class="list-item-text">
        ${clickable ? `<span class="recipe-title-link">${item.title}</span>` : item.title}
        ${item.note ? `<span class="list-item-note">${item.note}</span>` : ''}
        ${preview}
      </div>
      <button class="list-item-del" onclick="event.stopPropagation();deleteListItem('${key}',${i})">×</button>
    </div>`;
  }).join('');
  // update trigger badge
